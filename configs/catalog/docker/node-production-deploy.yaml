services:
  app:
    image: node:20-alpine
    container_name: node-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./app:/app
    command: ["node", "dist/server.js"]
    environment:
      NODE_ENV: production
      PORT: "3000"

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
