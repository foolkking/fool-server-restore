# Playbook: OpenVPN 服务器
#
# 比 WireGuard 复杂得多——需要 PKI（CA + 服务器证书 + 客户端证书）。
# 此 Playbook 装 openvpn + easy-rsa，用 easy-rsa 自动建 CA + server cert，
# 写 server.conf，启动 openvpn-server@server。客户端证书要事后单独签。
#
# 注意：第一次运行需要 1-2 分钟（生成 CA + server cert + DH 参数）。
name: Install and configure OpenVPN server with PKI
hosts: all

vars:
  port: 1194
  protocol: "udp"
  vpn_subnet: "10.8.0.0"
  vpn_netmask: "255.255.255.0"
  push_dns: "1.1.1.1"
  cipher: "AES-256-GCM"

tasks:
  - name: Install OpenVPN + easy-rsa
    module: package
    args:
      name: ["openvpn", "easy-rsa"]
      state: present

  - name: Enable IPv4 forwarding (required for routing peer traffic)
    module: sysctl
    args:
      name: net.ipv4.ip_forward
      value: 1

  - name: Initialize PKI (only when missing)
    module: shell
    args:
      cmd: |
        set -e
        sudo mkdir -p /etc/openvpn/easy-rsa
        # 复制 easy-rsa 模板。Ubuntu 在 /usr/share/easy-rsa，RHEL 同
        if [ ! -f /etc/openvpn/easy-rsa/easyrsa ]; then
          for src in /usr/share/easy-rsa /usr/share/doc/easy-rsa; do
            if [ -d "$src" ]; then
              sudo cp -r $src/* /etc/openvpn/easy-rsa/ 2>/dev/null || true
              break
            fi
          done
        fi
        cd /etc/openvpn/easy-rsa
        if [ ! -d pki ]; then
          sudo ./easyrsa init-pki
          # 用非交互模式
          export EASYRSA_BATCH=1
          export EASYRSA_REQ_CN=EnvForge-CA
          sudo -E ./easyrsa build-ca nopass
          sudo -E ./easyrsa build-server-full server nopass
          sudo ./easyrsa gen-dh
          sudo openvpn --genkey secret /etc/openvpn/easy-rsa/pki/ta.key
        fi
      creates: /etc/openvpn/easy-rsa/pki/private/server.key

  - name: Copy CA + server cert/key + DH + ta.key to /etc/openvpn/server/
    module: shell
    args:
      cmd: |
        sudo mkdir -p /etc/openvpn/server
        sudo cp /etc/openvpn/easy-rsa/pki/ca.crt /etc/openvpn/server/
        sudo cp /etc/openvpn/easy-rsa/pki/issued/server.crt /etc/openvpn/server/
        sudo cp /etc/openvpn/easy-rsa/pki/private/server.key /etc/openvpn/server/
        sudo cp /etc/openvpn/easy-rsa/pki/dh.pem /etc/openvpn/server/
        sudo cp /etc/openvpn/easy-rsa/pki/ta.key /etc/openvpn/server/
        sudo chmod 600 /etc/openvpn/server/server.key /etc/openvpn/server/ta.key

  - name: Render OpenVPN server.conf
    module: copy
    args:
      dest: /etc/openvpn/server/server.conf
      content: |
        # /etc/openvpn/server/server.conf — managed by EnvForge

        port {{ port }}
        proto {{ protocol }}
        dev tun

        ca /etc/openvpn/server/ca.crt
        cert /etc/openvpn/server/server.crt
        key /etc/openvpn/server/server.key
        dh /etc/openvpn/server/dh.pem
        tls-auth /etc/openvpn/server/ta.key 0

        topology subnet
        server {{ vpn_subnet }} {{ vpn_netmask }}
        ifconfig-pool-persist /var/log/openvpn/ipp.txt

        # 推全局路由 + DNS（典型全流量 VPN）
        push "redirect-gateway def1 bypass-dhcp"
        push "dhcp-option DNS {{ push_dns }}"

        keepalive 10 120
        cipher {{ cipher }}
        data-ciphers {{ cipher }}:AES-128-GCM:CHACHA20-POLY1305
        auth SHA256
        user nobody
        group nogroup
        persist-key
        persist-tun
        status /var/log/openvpn/openvpn-status.log
        log-append /var/log/openvpn/openvpn.log
        verb 3
        explicit-exit-notify 1

  - name: Setup NAT (MASQUERADE) for VPN subnet
    module: shell
    args:
      cmd: |
        WAN_IF=$(ip route | awk '/default/ {print $5; exit}')
        if ! sudo iptables -t nat -C POSTROUTING -s {{ vpn_subnet }}/24 -o $WAN_IF -j MASQUERADE 2>/dev/null; then
          sudo iptables -t nat -A POSTROUTING -s {{ vpn_subnet }}/24 -o $WAN_IF -j MASQUERADE
          sudo iptables -A FORWARD -i tun0 -j ACCEPT
          sudo iptables -A FORWARD -o tun0 -j ACCEPT
        fi
        # 持久化（Ubuntu/Debian 用 iptables-persistent，RHEL 用 firewalld 时另说）
        if command -v iptables-save >/dev/null 2>&1; then
          sudo mkdir -p /etc/iptables
          sudo iptables-save | sudo tee /etc/iptables/rules.v4 > /dev/null
        fi

  - name: Enable and start openvpn-server@server
    module: service
    args:
      name: "openvpn-server@server"
      enabled: true
      state: restarted

verify:
  - name: openvpn-server@server is active
    cmd: "systemctl is-active --quiet openvpn-server@server"
    hint: "服务未启动。看 'sudo journalctl -u openvpn-server@server -n 50'。常见：证书生成失败 / DH 参数太短 / cipher 不被支持。"
  - name: listening on {{ protocol }}/{{ port }}
    cmd: "if [ '{{ protocol }}' = 'udp' ]; then sudo ss -ulnp | grep ':{{ port }} '; else sudo ss -tlnp | grep ':{{ port }} '; fi"
    hint: "OpenVPN 没监听 {{ port }}：可能服务起了但 bind 失败（被占）。"
  - name: tun0 interface up
    cmd: "ip link show tun0 2>&1 | grep 'state UP'"
    hint: "tun0 没启动：可能内核 tun 模块没加载（sudo modprobe tun）。"
