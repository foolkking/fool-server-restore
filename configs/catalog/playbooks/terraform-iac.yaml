# Playbook: Terraform IaC
name: Install Terraform infrastructure as code
hosts: all

tasks:
  - name: Install prerequisites
    module: package
    args:
      name:
        - gnupg
        - software-properties-common
        - curl
      state: present

  - name: Add HashiCorp repository
    module: shell
    args:
      cmd: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg --yes
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update -qq
      creates: /etc/apt/sources.list.d/hashicorp.list

  - name: Install Terraform
    module: package
    args:
      name: terraform
      state: present

  - name: Verify Terraform
    module: shell
    args:
      cmd: "terraform --version"
