# Playbook: Terraform IaC
#
# 包名审查矩阵 (§7.5.2)：
#   terraform — HashiCorp 官方 apt repo (apt.releases.hashicorp.com) ✅
#               HashiCorp 官方 yum repo (rpm.releases.hashicorp.com) ✅
#               双轨已实现。
#   software-properties-common — Debian/Ubuntu only；RHEL 上 PACKAGE_ALIASES 已 (skip)
#
# 关键：之前仅 apt 路径 + 用了 `lsb_release`（RHEL 上不一定有），整个 RHEL 链路报错。
name: Install Terraform (cross-distro)
hosts: all

tasks:
  - name: Install prerequisites
    module: package
    args:
      name:
        - gnupg
        - curl
        - ca-certificates
      state: present
      ignore_missing: true

  - name: Add HashiCorp apt repository (Debian/Ubuntu)
    module: shell
    args:
      cmd: |
        if command -v apt-get >/dev/null 2>&1; then
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /etc/apt/keyrings/hashicorp.gpg --yes
          # 取 codename：优先 lsb_release，再 fallback /etc/os-release
          if command -v lsb_release >/dev/null 2>&1; then
            CODENAME="$(lsb_release -cs)"
          else
            CODENAME="$(. /etc/os-release && echo "${VERSION_CODENAME:-${UBUNTU_CODENAME:-jammy}}")"
          fi
          echo "deb [signed-by=/etc/apt/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $CODENAME main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list >/dev/null
          sudo apt-get update -qq
        fi

  - name: Add HashiCorp yum repository (RHEL/Anolis)
    module: shell
    args:
      cmd: |
        if command -v dnf >/dev/null 2>&1; then
          sudo dnf install -y dnf-plugins-core
          sudo dnf config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
        elif command -v yum >/dev/null 2>&1; then
          sudo yum install -y yum-utils
          sudo yum-config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
        fi

  - name: Install Terraform
    module: shell
    args:
      cmd: |
        if command -v apt-get >/dev/null 2>&1; then
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y terraform
        elif command -v dnf >/dev/null 2>&1; then
          sudo dnf install -y terraform
        elif command -v yum >/dev/null 2>&1; then
          sudo yum install -y terraform
        else
          echo "ERROR: no supported package manager" >&2
          exit 1
        fi

verify:
  - name: terraform works
    cmd: "terraform --version | head -1"
    hint: |
      terraform 没装上。看：
        Debian/Ubuntu: apt-cache policy terraform
        RHEL/Anolis:   dnf info terraform
      若仓库未生效，重跑本 Playbook 或对照 https://developer.hashicorp.com/terraform/install
