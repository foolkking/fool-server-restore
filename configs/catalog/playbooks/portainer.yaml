# Playbook: Portainer Docker 管理面板
name: Install Portainer Docker management UI
hosts: all

tasks:
  - name: Ensure Docker is installed
    module: shell
    args:
      cmd: "command -v docker || (echo 'Docker required' && exit 1)"

  - name: Create Portainer volume
    module: shell
    args:
      cmd: "sudo docker volume create portainer_data"

  - name: Run Portainer container
    module: shell
    args:
      cmd: |
        sudo docker run -d -p 9443:9443 -p 8000:8000 \
          --name portainer \
          --restart=always \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v portainer_data:/data \
          portainer/portainer-ce:latest
      creates: /var/lib/docker/volumes/portainer_data

  - name: Verify Portainer
    module: shell
    args:
      cmd: "sudo docker ps --filter 'name=portainer' --format '{{.Status}}'"
