# Playbook: Stirling PDF 工具箱
name: Install Stirling PDF
hosts: all

vars:
  sp_data_dir: /opt/stirling-pdf
  sp_port: 8089
  sp_single_user: false                # true = 无登录直接用（仅内网）；false = 多用户带登录

tasks:
  - name: 验证 Docker
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed." >&2; exit 1
        fi

  - name: 端口预检
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ sp_port }} "; then
          echo "WARN: Port {{ sp_port }} 占用："
          ss -tlnp | grep ":{{ sp_port }} "
        fi
    failed_when: false

  - name: 创建目录
    module: file
    args:
      path: "{{ sp_data_dir }}/{{ item }}"
      state: directory
      mode: "0755"
    loop:
      - configs
      - logs
      - tessdata
      - customFiles
      - extraConfigs

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: "{{ sp_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          stirling-pdf:
            image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
            container_name: stirling-pdf
            restart: unless-stopped
            ports:
              - "127.0.0.1:{{ sp_port }}:8080"
            volumes:
              - {{ sp_data_dir }}/configs:/configs
              - {{ sp_data_dir }}/logs:/logs
              - {{ sp_data_dir }}/tessdata:/usr/share/tessdata
              - {{ sp_data_dir }}/customFiles:/customFiles
              - {{ sp_data_dir }}/extraConfigs:/configs/extraConfigs
            environment:
              DOCKER_ENABLE_SECURITY: "{{ 'false' if sp_single_user else 'true' }}"
              SECURITY_ENABLELOGIN: "{{ 'false' if sp_single_user else 'true' }}"
              INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "false"
              LANGS: "en_US,zh_CN"
              SYSTEM_DEFAULTLOCALE: "zh_CN"
              UI_APPNAME: "Stirling PDF"
              UI_HOMEDESCRIPTION: "Local PDF tools"

  - name: 启动
    module: shell
    args:
      cmd: |
        cd {{ sp_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待启动
    module: shell
    args:
      cmd: |
        echo "等待 Stirling PDF 启动（首次约 30-60s）..."
        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:{{ sp_port }}/ -o /dev/null 2>&1; then
            echo "OK: Stirling PDF ready"
            exit 0
          fi
          sleep 3
        done
        echo "ERROR: Stirling PDF not ready"
        docker logs --tail 30 stirling-pdf
        exit 1

  - name: 显示访问信息
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "Stirling PDF 已就绪"
        echo "===================================================================="
        echo "  本机 URL:      http://127.0.0.1:{{ sp_port }}"
        echo "  模式:          {{ '单用户（无登录）' if sp_single_user else '多用户（含登录）' }}"
        echo ""
        if [ "{{ sp_single_user }}" != "True" ] && [ "{{ sp_single_user }}" != "true" ]; then
          echo "首次登录："
          echo "  默认凭据: admin / stirling"
          echo "  立即改密码（右上 → Account Settings）"
          echo ""
        fi
        echo "下一步:"
        echo "  1. 反代到 https://pdf.example.com（nginx + LE）"
        echo "  2. 浏览器打开 → 看到所有 PDF 工具列表（50+ 操作）"
        echo "  3. 拖拽 PDF → 选操作 → 下载结果"
        echo ""
        echo "OCR 加中文支持:"
        echo "  下载 chi_sim.traineddata 到 {{ sp_data_dir }}/tessdata/"
        echo "  来源 https://github.com/tesseract-ocr/tessdata"
        echo "===================================================================="

verify:
  - name: container running
    cmd: "docker ps --filter name=stirling-pdf --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "Stirling PDF 没起。docker logs stirling-pdf | tail -50"

  - name: web ui responds
    cmd: "curl -fsS http://127.0.0.1:{{ sp_port }}/ -o /dev/null"
    hint: "Web UI 不响应。docker logs stirling-pdf"
