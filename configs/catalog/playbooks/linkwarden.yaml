# Playbook: Linkwarden 书签 + 网页归档
name: Install Linkwarden
hosts: all

vars:
  lw_data_dir: /opt/linkwarden
  lw_port: 3000
  lw_db_password: ""
  lw_nextauth_secret: ""

tasks:
  - name: 验证 Docker
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed." >&2; exit 1
        fi

  - name: 端口预检
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ lw_port }} "; then
          echo "WARN: Port {{ lw_port }} 占用："
          ss -tlnp | grep ":{{ lw_port }} "
        fi
    failed_when: false

  - name: 创建目录
    module: file
    args:
      path: "{{ lw_data_dir }}/{{ item }}"
      state: directory
      mode: "0755"
    loop:
      - data
      - postgres-data

  - name: 生成 DB 密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ lw_db_password }}" ]; then
          openssl rand -base64 18 | tr -d '\n='
        else
          echo "{{ lw_db_password }}"
        fi
    register: lw_db_pass
    no_log: true

  - name: 生成 NextAuth secret
    module: shell
    args:
      cmd: |
        if [ -z "{{ lw_nextauth_secret }}" ]; then
          openssl rand -hex 32
        else
          echo "{{ lw_nextauth_secret }}"
        fi
    register: lw_secret
    no_log: true

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: "{{ lw_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          linkwarden-db:
            image: postgres:16-alpine
            container_name: linkwarden-db
            restart: unless-stopped
            environment:
              POSTGRES_USER: linkwarden
              POSTGRES_PASSWORD: "{{ lw_db_pass.stdout }}"
              POSTGRES_DB: linkwarden
            volumes:
              - {{ lw_data_dir }}/postgres-data:/var/lib/postgresql/data
            healthcheck:
              test: ["CMD", "pg_isready", "-U", "linkwarden"]

          linkwarden:
            image: ghcr.io/linkwarden/linkwarden:latest
            container_name: linkwarden
            restart: unless-stopped
            depends_on:
              linkwarden-db:
                condition: service_healthy
            ports:
              - "127.0.0.1:{{ lw_port }}:3000"
            volumes:
              - {{ lw_data_dir }}/data:/data/data
            environment:
              DATABASE_URL: "postgresql://linkwarden:{{ lw_db_pass.stdout }}@linkwarden-db:5432/linkwarden"
              NEXTAUTH_SECRET: "{{ lw_secret.stdout }}"
              NEXTAUTH_URL: "http://localhost:{{ lw_port }}/api/v1/auth"
              DISABLE_REGISTRATION: "false"     # 首次使用要让 admin 注册
              CSRF_TRUSTED_ORIGINS: ""

  - name: 启动
    module: shell
    args:
      cmd: |
        cd {{ lw_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待启动（首次较慢——下载 Chromium）
    module: shell
    args:
      cmd: |
        echo "等待 Linkwarden 启动（首次约 60-120s）..."
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:{{ lw_port }}/ -o /dev/null 2>&1; then
            echo "OK: Linkwarden ready"
            exit 0
          fi
          sleep 3
        done
        echo "ERROR: Linkwarden not ready"
        docker logs --tail 50 linkwarden
        exit 1

  - name: 显示访问信息
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "Linkwarden 已就绪"
        echo "===================================================================="
        echo "  本机 URL:      http://127.0.0.1:{{ lw_port }}"
        echo ""
        echo "下一步:"
        echo "  1. 浏览器打开 → 注册首个账号（首个用户自动 admin）"
        echo "  2. 反代到 https://links.example.com（nginx + LE）"
        echo "  3. 反代后改 docker-compose.yml 的 NEXTAUTH_URL = https://links.example.com/api/v1/auth"
        echo "  4. + Add Link → 粘贴 URL → Linkwarden 自动:"
        echo "     - 抓 OG 元数据"
        echo "     - 截图整页（headless Chromium）"
        echo "     - 保存全文 PDF"
        echo "     - 提取 readability 文本"
        echo "  5. 浏览器扩展（Chrome / Firefox）一键收藏"
        echo "  6. iOS / Android: 应用商店有官方 App"
        echo ""
        echo "**首个账号注册后建议关闭注册：**"
        echo "  改 docker-compose.yml: DISABLE_REGISTRATION: \"true\""
        echo "  docker compose up -d"
        echo "===================================================================="

verify:
  - name: container running
    cmd: "docker ps --filter name=linkwarden --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: |
      Linkwarden 没起：
        docker logs linkwarden | tail -50
        最常见：DB 没就绪 / Chromium 下载超时

  - name: db running
    cmd: "docker ps --filter name=linkwarden-db --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "PG 没起。docker logs linkwarden-db"

  - name: web ui responds
    cmd: "curl -fsS http://127.0.0.1:{{ lw_port }}/ -o /dev/null"
    hint: "Web UI 不响应。docker logs linkwarden"
