# Playbook: pyenv Python 版本管理
name: Install pyenv Python version manager
hosts: all

tasks:
  - name: Install pyenv build dependencies
    module: package
    args:
      name:
        - build-essential
        - libssl-dev
        - zlib1g-dev
        - libbz2-dev
        - libreadline-dev
        - libsqlite3-dev
        - libncursesw5-dev
        - xz-utils
        - tk-dev
        - libxml2-dev
        - libxmlsec1-dev
        - libffi-dev
        - liblzma-dev
        - curl
        - git
      state: present

  - name: Install pyenv
    module: shell
    args:
      cmd: "curl https://pyenv.run | bash"
      creates: ~/.pyenv

  - name: Add pyenv to bashrc
    module: lineinfile
    args:
      path: ~/.bashrc
      regexp: "^export PYENV_ROOT"
      line: 'export PYENV_ROOT="$HOME/.pyenv"; export PATH="$PYENV_ROOT/bin:$PATH"; eval "$(pyenv init -)"'
      create: true
