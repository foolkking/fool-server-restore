# Playbook: HAProxy 负载均衡器
#
# HAProxy — 高性能 TCP/HTTP 负载均衡。生产用了 20 年的成熟方案。
# 此 Playbook 装 haproxy 包 + 写一个最小可用的 haproxy.cfg（带 stats 页）。
# 真实的 backend 配置由用户在 frontend/backend 段补充。
name: Install and configure HAProxy load balancer
hosts: all

vars:
  stats_port: 8404
  stats_username: "admin"
  stats_password: "change-me"
  frontend_port: 80
  backend_addresses: "127.0.0.1:3000"

tasks:
  - name: Install HAProxy
    module: package
    args:
      name: haproxy
      state: present

  - name: Render /etc/haproxy/haproxy.cfg
    module: copy
    args:
      dest: /etc/haproxy/haproxy.cfg
      content: |
        # /etc/haproxy/haproxy.cfg — managed by EnvForge
        # 修改 backend_servers 段加入你真实的后端机器

        global
            log /dev/log    local0
            log /dev/log    local1 notice
            chroot /var/lib/haproxy
            stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
            stats timeout 30s
            user haproxy
            group haproxy
            daemon
            maxconn 4096
            ssl-default-bind-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
            ssl-default-bind-options ssl-min-ver TLSv1.2

        defaults
            log global
            mode http
            option httplog
            option dontlognull
            option forwardfor
            timeout connect 5000
            timeout client 50000
            timeout server 50000
            errorfile 400 /etc/haproxy/errors/400.http
            errorfile 403 /etc/haproxy/errors/403.http
            errorfile 408 /etc/haproxy/errors/408.http
            errorfile 500 /etc/haproxy/errors/500.http
            errorfile 502 /etc/haproxy/errors/502.http
            errorfile 503 /etc/haproxy/errors/503.http
            errorfile 504 /etc/haproxy/errors/504.http

        # ── Stats 页（HAProxy 自身的监控面板） ───────────────────
        listen stats
            bind *:{{ stats_port }}
            stats enable
            stats uri /
            stats refresh 5s
            stats hide-version
            stats realm HAProxy\ Statistics
            stats auth {{ stats_username }}:{{ stats_password }}

        # ── Frontend：接受外部流量 ──────────────────────────────
        frontend http_in
            bind *:{{ frontend_port }}
            default_backend backend_servers

        # ── Backend：转发给上游服务 ────────────────────────────
        # 修改下面的 server 行加入你的后端机器：
        #   server name address:port check
        backend backend_servers
            balance roundrobin
            option httpchk GET /
            server srv1 {{ backend_addresses }} check

  - name: Enable and start HAProxy
    module: service
    args:
      name: haproxy
      enabled: true
      state: restarted

verify:
  - name: haproxy service is active
    cmd: "systemctl is-active --quiet haproxy"
    hint: "服务未启动。看 'sudo journalctl -u haproxy -n 50'。常见：cfg 语法错（用 'sudo haproxy -c -f /etc/haproxy/haproxy.cfg' 单独检查）/ 端口被占。"
  - name: stats page reachable
    cmd: "curl -fsS -m 5 -u '{{ stats_username }}:{{ stats_password }}' http://127.0.0.1:{{ stats_port }}/ -o /dev/null -w '%{http_code}'"
    expect_stdout: "200"
    hint: "stats 页不可达：可能 stats_port 配错或被占。"
  - name: frontend port {{ frontend_port }} listening
    cmd: "sudo ss -tlnp | grep ':{{ frontend_port }} '"
    hint: "frontend 端口没监听：检查 cfg 里 'bind *:{{ frontend_port }}' 是否正确。"
