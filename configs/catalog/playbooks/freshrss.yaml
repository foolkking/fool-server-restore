# Playbook: FreshRSS 阅读器
name: Install FreshRSS
hosts: all

vars:
  fr_data_dir: /opt/freshrss
  fr_port: 8085
  fr_admin_user: "admin"
  fr_admin_password: ""
  fr_db_password: ""
  fr_cron_min: "*/15"

tasks:
  - name: 验证 Docker
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed." >&2; exit 1
        fi

  - name: 端口预检
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ fr_port }} "; then
          echo "WARN: Port {{ fr_port }} 占用："
          ss -tlnp | grep ":{{ fr_port }} "
        fi
    failed_when: false

  - name: 创建目录
    module: file
    args:
      path: "{{ fr_data_dir }}/{{ item }}"
      state: directory
      mode: "0755"
    loop:
      - data
      - extensions
      - postgres-data

  - name: 生成密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ fr_admin_password }}" ]; then
          openssl rand -base64 12 | tr -d '\n='
        else
          echo "{{ fr_admin_password }}"
        fi
    register: fr_pass
    no_log: true

  - name: 生成 DB 密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ fr_db_password }}" ]; then
          openssl rand -base64 18 | tr -d '\n='
        else
          echo "{{ fr_db_password }}"
        fi
    register: fr_db_pass
    no_log: true

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: "{{ fr_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          freshrss-db:
            image: postgres:16-alpine
            container_name: freshrss-db
            restart: unless-stopped
            environment:
              POSTGRES_USER: freshrss
              POSTGRES_PASSWORD: "{{ fr_db_pass.stdout }}"
              POSTGRES_DB: freshrss
            volumes:
              - {{ fr_data_dir }}/postgres-data:/var/lib/postgresql/data
            healthcheck:
              test: ["CMD", "pg_isready", "-U", "freshrss"]

          freshrss:
            image: freshrss/freshrss:latest
            container_name: freshrss
            restart: unless-stopped
            depends_on:
              freshrss-db:
                condition: service_healthy
            ports:
              - "127.0.0.1:{{ fr_port }}:80"
            volumes:
              - {{ fr_data_dir }}/data:/var/www/FreshRSS/data
              - {{ fr_data_dir }}/extensions:/var/www/FreshRSS/extensions
            environment:
              CRON_MIN: "{{ fr_cron_min }}"
              TZ: "Asia/Shanghai"

  - name: 启动
    module: shell
    args:
      cmd: |
        cd {{ fr_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待启动
    module: shell
    args:
      cmd: |
        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:{{ fr_port }}/i/ -o /dev/null 2>&1; then
            echo "OK: FreshRSS ready"
            exit 0
          fi
          sleep 2
        done
        echo "ERROR: FreshRSS not ready"
        docker logs --tail 50 freshrss
        exit 1

  - name: 显示访问信息
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "FreshRSS 已就绪"
        echo "===================================================================="
        echo "  本机 URL:     http://127.0.0.1:{{ fr_port }}"
        echo "  Cron 间隔:    每 {{ fr_cron_min }} 分钟拉一次 RSS"
        echo "  建议 admin:    {{ fr_admin_user }}"
        echo "  建议密码:      {{ fr_pass.stdout }}"
        echo ""
        echo "下一步（首次 setup wizard）："
        echo "  1. 浏览器打开 → 选语言 → Check"
        echo "  2. DB 配置:"
        echo "     Type:     PostgreSQL"
        echo "     Host:     freshrss-db"
        echo "     User:     freshrss"
        echo "     Password: <见 .env 内 FR_DB_PASSWORD>（看 docker-compose.yml）"
        echo "     Database: freshrss"
        echo "     Prefix:   freshrss_"
        echo "  3. 创建 admin: {{ fr_admin_user }} / 上面密码"
        echo "  4. 完成 → 登录"
        echo "  5. + Subscription → 加 RSS feed URL"
        echo "  6. iOS / Android: Reeder / Unread / NetNewsWire（Fever API 兼容）"
        echo "     → URL: https://rss.example.com/api/fever.php"
        echo "===================================================================="

verify:
  - name: container running
    cmd: "docker ps --filter name=freshrss --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "FreshRSS 没起。docker logs freshrss"

  - name: db running
    cmd: "docker ps --filter name=freshrss-db --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "PG 没起。docker logs freshrss-db"

  - name: web ui responds
    cmd: "curl -fsS http://127.0.0.1:{{ fr_port }}/i/ -o /dev/null"
    hint: "Web UI 不响应。docker logs freshrss"
