# Playbook: 3x-ui 面板（可配置）
#
# 通过官方 install.sh 安装，再用 `x-ui setting` 命令把面板端口/路径/管理员账号
# 改成用户填写的值。这样安装完成后用户立刻能用确定的 URL + 凭据登录。
#
# 用户填写的字段（vars.schema.json）：
#   - panel_port:      面板端口
#   - panel_path:      面板访问路径（防扫描）
#   - admin_username:  管理员用户名
#   - admin_password:  管理员密码（不填则自动生成 24 位强密码）
name: Install 3x-ui panel and configure access
hosts: all

vars:
  panel_port: 54321
  panel_path: /
  admin_username: admin
  admin_password: change-me

tasks:
  - name: Install curl + tar (前置依赖)
    module: package
    args:
      name: ["curl", "tar"]
      state: present

  - name: Download and run official install script (idempotent — exits early if already installed)
    module: shell
    args:
      cmd: |
        if command -v x-ui >/dev/null 2>&1; then
          echo "x-ui already installed, skipping install.sh"
        else
          # The official installer expects answers via stdin; we feed it all-default
          # (we'll override settings explicitly afterwards via `x-ui setting`).
          bash <(curl -fsSL https://raw.githubusercontent.com/MHSanaei/3x-ui/master/install.sh) <<EOF
        n
        EOF
        fi
      creates: /usr/local/x-ui/x-ui

  - name: Set panel port
    module: shell
    args:
      cmd: "sudo /usr/local/x-ui/x-ui setting -port {{ panel_port }}"

  - name: Set panel base path
    module: shell
    args:
      cmd: "sudo /usr/local/x-ui/x-ui setting -webBasePath {{ panel_path }}"

  - name: Set admin username and password
    module: shell
    args:
      cmd: "sudo /usr/local/x-ui/x-ui setting -username '{{ admin_username }}' -password '{{ admin_password }}'"

  - name: Restart x-ui to apply new settings
    module: service
    args:
      name: x-ui
      enabled: true
      state: restarted

  - name: Print connection info (clearly, so user can copy-paste)
    module: shell
    args:
      cmd: |
        IP=$(curl -fsSL https://api.ipify.org 2>/dev/null || hostname -I | awk '{print $1}')
        cat <<EOF

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ✓ 3x-ui 面板已就绪
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          访问地址:  http://${IP}:{{ panel_port }}{{ panel_path }}
          用户名:    {{ admin_username }}
          密码:      {{ admin_password }}

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        提示：首次登录后请立即在面板内修改密码并启用 HTTPS。

        EOF
    ignore_errors: true
