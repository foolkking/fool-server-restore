# Playbook: Immich 自托管照片库
#
# 自托管 Google Photos 替代——AI 人脸识别 / 物体分类 / 时间轴 + iOS/Android 原生 App。
name: Install Immich self-hosted photos
hosts: all

vars:
  imm_domain: "photos.example.com"
  imm_db_password: ""              # 留空 = 自动生成
  imm_data_dir: /opt/immich
  imm_upload_location: /opt/immich/library
  imm_port: 2283
  imm_disable_ml: false            # ML 服务用 1-2 GB RAM——小机器关
  imm_jwt_secret: ""               # 留空 = 自动生成

tasks:
  - name: 验证 Docker
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed." >&2; exit 1
        fi

  - name: 端口预检
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ imm_port }} "; then
          echo "WARN: Port {{ imm_port }} 占用："
          ss -tlnp | grep ":{{ imm_port }} "
        fi
    failed_when: false

  - name: 创建目录
    module: file
    args:
      path: "{{ item }}"
      state: directory
      mode: "0755"
    loop:
      - "{{ imm_data_dir }}"
      - "{{ imm_data_dir }}/postgres"
      - "{{ imm_upload_location }}"
      - "{{ imm_data_dir }}/model-cache"

  - name: 生成 DB 密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ imm_db_password }}" ]; then
          openssl rand -base64 24 | tr -d '\n'
        else
          echo "{{ imm_db_password }}"
        fi
    register: imm_db_pass
    no_log: true

  - name: 生成 JWT secret
    module: shell
    args:
      cmd: |
        if [ -z "{{ imm_jwt_secret }}" ]; then
          openssl rand -base64 64 | tr -d '\n'
        else
          echo "{{ imm_jwt_secret }}"
        fi
    register: imm_jwt
    no_log: true

  - name: 写入 .env 文件
    module: copy
    args:
      dest: "{{ imm_data_dir }}/.env"
      mode: "0640"
      content: |
        # Immich
        UPLOAD_LOCATION={{ imm_upload_location }}
        IMMICH_VERSION=release
        DB_HOSTNAME=immich-postgres
        DB_USERNAME=postgres
        DB_PASSWORD={{ imm_db_pass.stdout }}
        DB_DATABASE_NAME=immich
        REDIS_HOSTNAME=immich-redis
        IMMICH_PORT={{ imm_port }}
        JWT_SECRET={{ imm_jwt.stdout }}

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: "{{ imm_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          immich-server:
            container_name: immich
            image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
            restart: unless-stopped
            volumes:
              - ${UPLOAD_LOCATION}:/usr/src/app/upload
              - /etc/localtime:/etc/localtime:ro
            env_file:
              - .env
            ports:
              - "127.0.0.1:${IMMICH_PORT}:2283"
            depends_on:
              - immich-redis
              - immich-postgres
            healthcheck:
              test: ["CMD", "/bin/sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/2283 && echo -e 'GET / HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 >/dev/null"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 60s

          immich-machine-learning:
            container_name: immich-ml
            image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
            restart: {% if imm_disable_ml %}"no"{% else %}unless-stopped{% endif %}
            profiles:
              {% if imm_disable_ml %}
              - disabled
              {% endif %}
            volumes:
              - {{ imm_data_dir }}/model-cache:/cache
            env_file:
              - .env

          immich-redis:
            container_name: immich-redis
            image: docker.io/redis:6.2-alpine
            restart: unless-stopped
            healthcheck:
              test: redis-cli ping || exit 1

          immich-postgres:
            container_name: immich-postgres
            image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0
            restart: unless-stopped
            environment:
              POSTGRES_PASSWORD: {{ imm_db_pass.stdout }}
              POSTGRES_USER: postgres
              POSTGRES_DB: immich
              POSTGRES_INITDB_ARGS: '--data-checksums'
            volumes:
              - {{ imm_data_dir }}/postgres:/var/lib/postgresql/data
            healthcheck:
              test: pg_isready -U postgres -d immich

  - name: 启动 Immich
    module: shell
    args:
      cmd: |
        cd {{ imm_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待 Immich ready
    module: shell
    args:
      cmd: |
        echo "等待 Immich 启动（首次约 60-120s）..."
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:{{ imm_port }}/api/server-info/ping >/dev/null 2>&1; then
            echo "OK: Immich ready"
            exit 0
          fi
          sleep 3
        done
        echo "ERROR: Immich not ready"
        docker logs --tail 50 immich
        exit 1

  - name: 显示访问信息
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "Immich 已就绪"
        echo "===================================================================="
        echo "  本机 URL:        http://127.0.0.1:{{ imm_port }}"
        echo "  公网 URL:        https://{{ imm_domain }} (需配反代)"
        echo "  上传目录:        {{ imm_upload_location }}"
        echo "  ML 服务:         {{ '已禁用' if imm_disable_ml else '已启用（人脸识别 + 物体分类）' }}"
        echo ""
        echo "下一步:"
        echo "  1. 浏览器打开 http://server-ip:{{ imm_port }}/"
        echo "  2. 创建首个 admin 账号（注册页面）"
        echo "  3. 反代到 {{ imm_domain }}（nginx + LE）—— 见 immich.md"
        echo "  4. 手机装 Immich App（iOS / Android），URL 填 https://{{ imm_domain }}"
        echo "  5. 启用自动备份 → 全家手机相册秒变 Google Photos"
        echo "===================================================================="

verify:
  - name: immich-server container running
    cmd: "docker ps --filter name=immich --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: |
      Immich server 没起：
        docker logs immich | tail -50
        最常见：上传目录权限 / PG 没就绪 / pgvecto 镜像拉失败

  - name: postgres running
    cmd: "docker ps --filter name=immich-postgres --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "PG 没起。docker logs immich-postgres"

  - name: redis running
    cmd: "docker ps --filter name=immich-redis --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "Redis 没起。docker logs immich-redis"

  - name: api responding
    cmd: "curl -fsS http://127.0.0.1:{{ imm_port }}/api/server-info/ping -o /dev/null"
    hint: "API ping 不响应。Immich 还在启动？等 30 秒重试。"

  - name: upload dir writable
    cmd: "test -w {{ imm_upload_location }}"
    hint: "上传目录 {{ imm_upload_location }} 不可写。chown / chmod 检查。"
