# Playbook: Nginx Web 服务（可配置）
#
# 此 Playbook 支持表单化配置，参见 nginx-web-service.vars.json：
#   - domain: 网站域名
#   - listen_port: 监听端口（默认 80）
#   - enable_reverse_proxy: 是否启用反向代理（默认 false）
#   - upstream_url: 后端应用地址（仅当反向代理启用时）
#   - client_max_body_size: 上传大小限制
#
# Playbook 中的 {{ var }} 占位符会被表单值替换；如不填表单则使用默认值。
name: Install and configure Nginx web server
hosts: all

vars:
  domain: example.com
  listen_port: 80
  enable_reverse_proxy: false
  upstream_url: http://127.0.0.1:3000
  client_max_body_size: 10m

tasks:
  - name: Install nginx package
    module: package
    args:
      name: nginx
      state: present

  # 禁用发行版自带的 default server（Ubuntu sites-enabled/default + RHEL conf.d/default.conf）。
  # 这两个文件都标了 default_server 或 server_name localhost/_，会在用户用 IP 访问、
  # 或 DNS 解析不一致时拦截请求并返回 nginx 默认 404 页面（小写 "nginx" 那个），
  # 让我们的 envforge-default.conf 看上去"配了等于没配"。
  # 备份到 .envforge.bak 而不是 rm，防误删；卸载时可恢复。
  - name: Disable distro-provided default server (避免 default_server 抢占)
    module: shell
    args:
      cmd: |
        # Ubuntu/Debian: sites-enabled/default 是软链 → sites-available/default
        if [ -e /etc/nginx/sites-enabled/default ]; then
          sudo mv /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/default.envforge.bak
          echo "Disabled /etc/nginx/sites-enabled/default"
        fi
        # RHEL/CentOS/Anolis/Rocky: conf.d/default.conf 是普通文件
        if [ -e /etc/nginx/conf.d/default.conf ] && [ ! -e /etc/nginx/conf.d/default.conf.envforge.bak ]; then
          sudo mv /etc/nginx/conf.d/default.conf /etc/nginx/conf.d/default.conf.envforge.bak
          echo "Disabled /etc/nginx/conf.d/default.conf"
        fi
        # 都不存在时（重装或精简版）静默通过

  # 孤儿 nginx 清理：systemd 之外手工跑过 `sudo nginx`（或 nginx 服务异常退出
  # 但 worker 残留）会留下 systemd 不认识的进程，导致 systemctl restart 时
  # 老 master 仍占着端口、新进程 bind 失败。
  # 检测：systemctl 认为 nginx 不 active，但 pgrep 还能找到 nginx master。
  # 处置：先 nginx -s quit 优雅关；超时后 SIGTERM；再超时 SIGKILL。
  # 必须早于 Pre-check 跑——否则孤儿占着端口 80（用户可能填了 8080），
  # Pre-check 看不到冲突，但 service: restarted 时新进程会撞上孤儿绑的端口。
  - name: Reclaim orphan nginx processes (not managed by systemd)
    module: shell
    args:
      cmd: |
        if systemctl is-active --quiet nginx; then
          echo "✓ nginx is managed by systemd — no orphan check needed"
          exit 0
        fi
        # systemd 视角不 active；看是否有孤儿进程
        ORPHAN_PIDS=$(pgrep -f '^nginx: master' 2>/dev/null || true)
        if [ -z "$ORPHAN_PIDS" ]; then
          echo "✓ No orphan nginx process"
          exit 0
        fi
        echo "⚠ Found orphan nginx master process(es): $ORPHAN_PIDS"
        echo "  这些是 systemd 管不到的进程（之前手工跑过 sudo nginx 留下的）。"
        echo "  正在尝试优雅关闭…"
        # 1. 先用 nginx -s quit 优雅关闭（让 worker 处理完当前请求）
        sudo nginx -s quit 2>/dev/null || true
        # 2. 等最多 5 秒
        for i in 1 2 3 4 5; do
          STILL=$(pgrep -f '^nginx: master' 2>/dev/null || true)
          [ -z "$STILL" ] && break
          sleep 1
        done
        # 3. 还活着 → SIGTERM
        STILL=$(pgrep -f '^nginx: master' 2>/dev/null || true)
        if [ -n "$STILL" ]; then
          echo "  优雅关闭超时，发送 SIGTERM..."
          sudo pkill -TERM -f '^nginx:' 2>/dev/null || true
          sleep 2
        fi
        # 4. 还活着 → SIGKILL
        STILL=$(pgrep -f '^nginx: master' 2>/dev/null || true)
        if [ -n "$STILL" ]; then
          echo "  强制 SIGKILL..."
          sudo pkill -KILL -f '^nginx:' 2>/dev/null || true
          sleep 1
        fi
        # 5. 验证
        STILL=$(pgrep -f '^nginx: master' 2>/dev/null || true)
        if [ -n "$STILL" ]; then
          echo "✗ 仍有 nginx 进程未能清理: $STILL"
          echo "  请手工执行: sudo kill -9 $STILL"
          exit 1
        fi
        # 也清掉过期的 pid 文件（nginx 启动会写 /run/nginx.pid，老进程留下可能误导）
        sudo rm -f /run/nginx.pid /var/run/nginx.pid 2>/dev/null || true
        echo "✓ Orphan nginx cleaned up"

  # 预检：端口 listen_port 是否已被 nginx 之外的服务占用
  # 提前在这里 fail，比之后 systemctl start 报 "bind() to 0.0.0.0:80 failed"
  # 有用得多——能直接告诉用户是谁占着端口、怎么处理。
  - name: Pre-check listen_port is not held by another service
    module: shell
    args:
      cmd: |
        PORT="{{ listen_port }}"
        # ss 列出所有 LISTEN 的 socket；过滤本端口
        OCC=$(sudo ss -tlnp 2>/dev/null | awk -v p=":${PORT}$" 'NR>1 && $4 ~ p { print; exit }')
        if [ -z "$OCC" ]; then
          echo "✓ Port $PORT is free"
          exit 0
        fi
        # nginx 自己占用 → OK，service: restarted 会重新绑
        if echo "$OCC" | grep -q '"nginx"'; then
          echo "✓ Port $PORT is currently held by nginx itself (will be restarted)"
          exit 0
        fi
        # 是别人 → fail with friendly message
        echo "✗ Port $PORT is already occupied by another process:"
        echo "  $OCC"
        echo ""
        echo "请先停止占用进程，或在表单中改用其它 listen_port（如 8080）。"
        echo "常见 web 服务的关停 + 禁用自启命令："
        echo "  apache2  : sudo systemctl disable --now apache2"
        echo "  httpd    : sudo systemctl disable --now httpd"
        echo "  caddy    : sudo systemctl disable --now caddy"
        echo "  lighttpd : sudo systemctl disable --now lighttpd"
        echo "  openresty: sudo systemctl disable --now openresty"
        exit 1

  - name: Render default site config (静态站点)
    module: template
    args:
      dest: /etc/nginx/conf.d/envforge-default.conf
      content: |
        server {
            listen {{ listen_port }} default_server;
            listen [::]:{{ listen_port }} default_server;
            server_name {{ domain }} _;
            client_max_body_size {{ client_max_body_size }};

            location / {
                root /usr/share/nginx/html;
                index index.html index.htm;
            }

            access_log /var/log/nginx/envforge-access.log;
            error_log  /var/log/nginx/envforge-error.log;
        }
    when: not enable_reverse_proxy

  - name: Render reverse-proxy site config
    module: template
    args:
      dest: /etc/nginx/conf.d/envforge-default.conf
      content: |
        server {
            listen {{ listen_port }} default_server;
            listen [::]:{{ listen_port }} default_server;
            server_name {{ domain }} _;
            client_max_body_size {{ client_max_body_size }};

            location / {
                proxy_pass {{ upstream_url }};
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_http_version 1.1;
                proxy_set_header Upgrade           $http_upgrade;
                proxy_set_header Connection        "upgrade";
                proxy_read_timeout 300s;
                proxy_send_timeout 300s;
            }

            access_log /var/log/nginx/envforge-access.log;
            error_log  /var/log/nginx/envforge-error.log;
        }
    when: enable_reverse_proxy

  - name: Validate nginx config (nginx -t)
    module: shell
    args:
      cmd: "sudo nginx -t"

  # 全配置端口扫描：nginx -t 通过后，扫描所有 server 块声明的 listen 端口。
  # 仅检查用户填的 listen_port 不够——发行版自带的 default.conf 可能漏了，
  # 或者 /etc/nginx/conf.d/ 里有用户自己留下的别的配置文件占着 80 端口。
  # 扫到非 nginx 占用 → fail，列出占用者；扫到 nginx 自己占着 → 已经在预检
  # task 里清过孤儿，这里复查一次稳妥。
  - name: Scan all nginx-configured ports for conflicts
    module: shell
    args:
      cmd: |
        # 从 nginx -T 输出抓所有 listen 端口（去重）
        PORTS=$(sudo nginx -T 2>/dev/null \
          | awk '/^\s*listen\s+/ {
              for(i=2;i<=NF;i++) {
                if (match($i, /:?([0-9]+)/, m)) { print m[1]; break }
              }
            }' \
          | sort -u)
        if [ -z "$PORTS" ]; then
          echo "⚠ Could not parse listen ports from nginx -T (unusual)"
          exit 0
        fi
        echo "Nginx will listen on: $(echo $PORTS | tr '\n' ' ')"
        BAD=0
        for P in $PORTS; do
          OCC=$(sudo ss -tlnp 2>/dev/null | awk -v p=":${P}$" 'NR>1 && $4 ~ p { print; exit }')
          if [ -z "$OCC" ]; then
            echo "  ✓ port $P: free"
            continue
          fi
          if echo "$OCC" | grep -q '"nginx"'; then
            echo "  ✓ port $P: held by nginx itself (will be reclaimed by systemctl restart)"
            continue
          fi
          echo "  ✗ port $P: occupied by another process"
          echo "    $OCC"
          BAD=1
        done
        if [ "$BAD" = "1" ]; then
          echo ""
          echo "请先停止占用进程，或编辑 /etc/nginx/conf.d/*.conf 移除多余的 listen 端口。"
          echo "常见检查："
          echo "  sudo grep -rn 'listen' /etc/nginx/ | grep -v envforge.bak"
          exit 1
        fi
        echo "✓ All ports free or held by nginx itself"

  # SELinux 预检：RHEL/CentOS/Anolis 上 SELinux 默认拒绝 nginx 连本地非常用端口
  # （只放行 80/443/8080 等少数端口）。如果用户开了反代但 upstream 端口非白名单，
  # nginx 启动后访问会拿到 502 + 日志 "Permission denied (13)"。
  # 这里探测当前是 enforcing 模式时主动给 nginx 加上 httpd_can_network_relay 布尔，
  # 让 nginx 能 proxy 任意端口。已经设过的话 setsebool 是幂等的。
  - name: SELinux — allow nginx to proxy to any local port (RHEL family only)
    module: shell
    args:
      cmd: |
        if ! command -v getenforce >/dev/null 2>&1; then
          echo "Not RHEL family (no getenforce) — skipping SELinux config"
          exit 0
        fi
        MODE=$(getenforce 2>/dev/null || echo Disabled)
        if [ "$MODE" = "Disabled" ]; then
          echo "SELinux is Disabled — no action needed"
          exit 0
        fi
        # Permissive 也设置一下，避免后续切回 Enforcing 时翻车
        sudo setsebool -P httpd_can_network_connect 1 2>/dev/null || true
        sudo setsebool -P httpd_can_network_relay 1 2>/dev/null || true
        echo "SELinux booleans set: httpd_can_network_connect, httpd_can_network_relay"
    when: enable_reverse_proxy
    ignore_errors: true

  - name: Enable nginx service to start on boot
    module: service
    args:
      name: nginx
      enabled: true
      state: restarted

  - name: Verify nginx is running
    module: shell
    args:
      cmd: "systemctl is-active --quiet nginx && echo 'nginx is running on port {{ listen_port }} for {{ domain }}'"
    ignore_errors: true

verify:
  - name: nginx process is active
    cmd: "systemctl is-active --quiet nginx"
    hint: |
      Nginx 没启起来。最常见原因（按可能性排序）：
        1. 端口 {{ listen_port }} 被另一个 web 服务占用——sudo ss -tlnp | grep :{{ listen_port }} 查谁
           常见占用：apache2 / httpd / caddy / openresty / 容器
        2. 配置文件语法错误——sudo nginx -t 看具体行号
        3. SELinux/AppArmor 阻止 nginx 监听该端口（非 80/443 时常见）
      详情：sudo systemctl status nginx --no-pager -l && sudo journalctl -u nginx -n 50
  - name: HTTP endpoint responds with 2xx/3xx (not 404 from default server)
    cmd: "curl -fsS -m 5 http://localhost:{{ listen_port }}/ -o /dev/null -w '%{http_code}'"
    expect_stdout: "200"
    hint: |
      Nginx 在线但返回非 200。按状态码排查：
        - 404 + 页面写小写 "nginx"：发行版自带的 default_server 抢占了请求。
          确认 envforge-default.conf 已生效：sudo nginx -T | grep envforge-default
          确认旧 default 已禁用：ls /etc/nginx/conf.d/default.conf* /etc/nginx/sites-enabled/default* 2>/dev/null
        - 502 Bad Gateway（反代模式）：上游 {{ upstream_url }} 不可达。
          检查后端：curl -v {{ upstream_url }}
          SELinux 阻止（RHEL 系）：sudo ausearch -m avc -ts recent | grep nginx
          → sudo setsebool -P httpd_can_network_connect 1
        - 403 Forbidden：静态模式下 /usr/share/nginx/html 不可读，或 SELinux/权限问题
  - name: nginx config is syntactically valid
    cmd: "sudo nginx -t 2>&1"
    expect_stdout: "syntax is ok"
    hint: "Nginx 配置语法错误。看 stderr 里 'in /etc/nginx/...' 这一行的具体错误。常见：proxy_pass URL 格式错、include 路径不存在。"
