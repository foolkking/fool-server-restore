# Playbook: Forgejo (Gitea fork)
#
# 完全社区驱动的 Gitea fork（Codeberg / FSF 推荐）。
# 数据库 schema 与 Gitea 100% 兼容，可双向迁移。
name: Install Forgejo self-hosted Git
hosts: all

vars:
  fj_domain: "git.example.com"
  fj_admin_email: "admin@example.com"
  fj_db_password: ""              # 留空 = 自动生成
  fj_data_dir: /opt/forgejo
  fj_http_port: 3000
  fj_ssh_port: 222                # 与系统 SSH 22 区分

tasks:
  - name: 验证 Docker
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed." >&2; exit 1
        fi

  - name: 端口预检
    module: shell
    args:
      cmd: |
        for p in {{ fj_http_port }} {{ fj_ssh_port }}; do
          if ss -tlnp 2>/dev/null | grep -q ":$p "; then
            echo "WARN: 端口 $p 占用："
            ss -tlnp | grep ":$p "
          fi
        done
    failed_when: false

  - name: 创建目录
    module: file
    args:
      path: "{{ fj_data_dir }}/{{ item }}"
      state: directory
      mode: "0755"
    loop:
      - data
      - postgres-data
      - config

  - name: 生成 DB 密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ fj_db_password }}" ]; then
          openssl rand -base64 24 | tr -d '\n'
        else
          echo "{{ fj_db_password }}"
        fi
    register: fj_db_pass
    no_log: true

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: "{{ fj_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          forgejo:
            image: codeberg.org/forgejo/forgejo:latest
            container_name: forgejo
            restart: unless-stopped
            environment:
              USER_UID: 1000
              USER_GID: 1000
              FORGEJO__database__DB_TYPE: postgres
              FORGEJO__database__HOST: forgejo-db:5432
              FORGEJO__database__NAME: forgejo
              FORGEJO__database__USER: forgejo
              FORGEJO__database__PASSWD: "{{ fj_db_pass.stdout }}"
              FORGEJO__server__DOMAIN: "{{ fj_domain }}"
              FORGEJO__server__ROOT_URL: "https://{{ fj_domain }}/"
              FORGEJO__server__SSH_DOMAIN: "{{ fj_domain }}"
              FORGEJO__server__SSH_PORT: "{{ fj_ssh_port }}"
              FORGEJO__server__START_SSH_SERVER: "true"
              FORGEJO__server__OFFLINE_MODE: "false"
              FORGEJO__service__DISABLE_REGISTRATION: "false"
              FORGEJO__service__REQUIRE_SIGNIN_VIEW: "false"
              FORGEJO__service__SHOW_REGISTRATION_BUTTON: "true"
              FORGEJO__security__INSTALL_LOCK: "false"
              FORGEJO__mailer__ENABLED: "false"
            volumes:
              - {{ fj_data_dir }}/data:/var/lib/gitea
              - {{ fj_data_dir }}/config:/etc/gitea
              - /etc/timezone:/etc/timezone:ro
              - /etc/localtime:/etc/localtime:ro
            depends_on:
              forgejo-db:
                condition: service_healthy
            ports:
              - "127.0.0.1:{{ fj_http_port }}:3000"
              - "{{ fj_ssh_port }}:22"     # SSH 必须公网（git clone 用）
            healthcheck:
              test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/healthz"]
              interval: 30s
              timeout: 5s
              retries: 5
              start_period: 30s

          forgejo-db:
            image: postgres:16-alpine
            container_name: forgejo-db
            restart: unless-stopped
            environment:
              POSTGRES_USER: forgejo
              POSTGRES_PASSWORD: "{{ fj_db_pass.stdout }}"
              POSTGRES_DB: forgejo
            volumes:
              - {{ fj_data_dir }}/postgres-data:/var/lib/postgresql/data
            healthcheck:
              test: ["CMD-SHELL", "pg_isready -U forgejo"]
              interval: 10s
              timeout: 5s
              retries: 5

  - name: 启动 Forgejo
    module: shell
    args:
      cmd: |
        cd {{ fj_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待 Forgejo ready
    module: shell
    args:
      cmd: |
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:{{ fj_http_port }}/api/healthz >/dev/null 2>&1; then
            echo "OK: Forgejo ready"
            exit 0
          fi
          sleep 3
        done
        echo "ERROR: Forgejo not ready"
        docker logs --tail 50 forgejo
        exit 1

  - name: 显示访问信息
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "Forgejo 已就绪"
        echo "===================================================================="
        echo "  本机 URL:      http://127.0.0.1:{{ fj_http_port }}"
        echo "  公网 URL:      https://{{ fj_domain }} (需配反代)"
        echo "  SSH:          ssh://git@{{ fj_domain }}:{{ fj_ssh_port }}/"
        echo ""
        echo "下一步:"
        echo "  1. 浏览器打开 http://server-ip:{{ fj_http_port }}/install"
        echo "  2. 走完安装向导（DB 信息已预填）"
        echo "  3. 创建 admin 账号（首个账号自动 admin）"
        echo "  4. 反代 https://{{ fj_domain }} → 127.0.0.1:{{ fj_http_port }}"
        echo "  5. 客户端 git clone:"
        echo "       HTTPS: git clone https://{{ fj_domain }}/user/repo.git"
        echo "       SSH:   git clone ssh://git@{{ fj_domain }}:{{ fj_ssh_port }}/user/repo.git"
        echo "===================================================================="

verify:
  - name: forgejo container running
    cmd: "docker ps --filter name=forgejo --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: |
      Forgejo 没起：
        docker logs forgejo | tail -50
        最常见：PG 没就绪 / 端口冲突

  - name: postgres running
    cmd: "docker ps --filter name=forgejo-db --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "PG 没起。docker logs forgejo-db"

  - name: api healthz
    cmd: "curl -fsS http://127.0.0.1:{{ fj_http_port }}/api/healthz -o /dev/null"
    hint: "API healthz 不响应。docker logs --tail 100 forgejo"

  - name: ssh port {{ fj_ssh_port }} listening
    cmd: "ss -tlnp 2>/dev/null | grep -q ':{{ fj_ssh_port }} '"
    hint: "SSH 端口 {{ fj_ssh_port }} 没监听。git clone 走 SSH 会失败。"
