# Playbook: OnlyOffice Document Server
#
# 在线协作 Office —— Nextcloud / SeaTable 等的官方推荐文档后端。
# 直接编辑 docx / xlsx / pptx，多人协作。
name: Install OnlyOffice Document Server
hosts: all

vars:
  oo_domain: "office.example.com"
  oo_jwt_secret: ""               # 留空 = 自动生成
  oo_db_password: ""              # 留空 = 自动生成
  oo_rabbitmq_password: ""        # 留空 = 自动生成
  oo_port: 8083
  oo_data_dir: /opt/onlyoffice
  oo_max_request_body_size: "100M"

tasks:
  - name: 验证 Docker
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed." >&2; exit 1
        fi

  - name: 端口预检
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ oo_port }} "; then
          echo "WARN: 端口 {{ oo_port }} 占用："
          ss -tlnp | grep ":{{ oo_port }} "
        fi
    failed_when: false

  - name: 创建目录
    module: file
    args:
      path: "{{ oo_data_dir }}/{{ item }}"
      state: directory
      mode: "0755"
    loop:
      - data
      - logs
      - cache
      - postgresql
      - rabbitmq

  - name: 生成 JWT secret
    module: shell
    args:
      cmd: |
        if [ -z "{{ oo_jwt_secret }}" ]; then
          openssl rand -hex 32
        else
          echo "{{ oo_jwt_secret }}"
        fi
    register: oo_jwt
    no_log: true

  - name: 生成 DB 密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ oo_db_password }}" ]; then
          openssl rand -base64 24 | tr -d '\n'
        else
          echo "{{ oo_db_password }}"
        fi
    register: oo_db_pass
    no_log: true

  - name: 生成 RabbitMQ 密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ oo_rabbitmq_password }}" ]; then
          openssl rand -base64 24 | tr -d '\n'
        else
          echo "{{ oo_rabbitmq_password }}"
        fi
    register: oo_mq_pass
    no_log: true

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: "{{ oo_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          onlyoffice-postgres:
            image: postgres:15-alpine
            container_name: onlyoffice-postgres
            restart: unless-stopped
            environment:
              POSTGRES_DB: onlyoffice
              POSTGRES_USER: onlyoffice
              POSTGRES_PASSWORD: "{{ oo_db_pass.stdout }}"
            volumes:
              - {{ oo_data_dir }}/postgresql:/var/lib/postgresql/data
            healthcheck:
              test: ["CMD", "pg_isready", "-U", "onlyoffice"]
              interval: 10s

          onlyoffice-rabbitmq:
            image: rabbitmq:3-management-alpine
            container_name: onlyoffice-rabbitmq
            restart: unless-stopped
            environment:
              RABBITMQ_DEFAULT_USER: onlyoffice
              RABBITMQ_DEFAULT_PASS: "{{ oo_mq_pass.stdout }}"
            volumes:
              - {{ oo_data_dir }}/rabbitmq:/var/lib/rabbitmq

          onlyoffice-documentserver:
            image: onlyoffice/documentserver:latest
            container_name: onlyoffice-docs
            restart: unless-stopped
            depends_on:
              onlyoffice-postgres:
                condition: service_healthy
              onlyoffice-rabbitmq:
                condition: service_started
            environment:
              JWT_ENABLED: "true"
              JWT_SECRET: "{{ oo_jwt.stdout }}"
              JWT_HEADER: "Authorization"
              JWT_IN_BODY: "true"
              DB_TYPE: postgres
              DB_HOST: onlyoffice-postgres
              DB_PORT: 5432
              DB_NAME: onlyoffice
              DB_USER: onlyoffice
              DB_PWD: "{{ oo_db_pass.stdout }}"
              AMQP_URI: "amqp://onlyoffice:{{ oo_mq_pass.stdout }}@onlyoffice-rabbitmq:5672"
              USE_UNAUTHORIZED_STORAGE: "false"
            volumes:
              - {{ oo_data_dir }}/data:/var/www/onlyoffice/Data
              - {{ oo_data_dir }}/logs:/var/log/onlyoffice
              - {{ oo_data_dir }}/cache:/var/lib/onlyoffice
            ports:
              - "127.0.0.1:{{ oo_port }}:80"
            healthcheck:
              test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthcheck"]
              interval: 30s
              timeout: 5s
              retries: 5
              start_period: 60s

  - name: 启动栈
    module: shell
    args:
      cmd: |
        cd {{ oo_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待 Document Server ready
    module: shell
    args:
      cmd: |
        echo "等待 OnlyOffice 启动（首次 60-90s）..."
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:{{ oo_port }}/healthcheck >/dev/null 2>&1; then
            echo "OK: ready"
            exit 0
          fi
          sleep 3
        done
        echo "ERROR: not ready in 180s"
        docker logs --tail 50 onlyoffice-docs
        exit 1

  - name: 显示集成信息
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "OnlyOffice Document Server 已就绪"
        echo "===================================================================="
        echo "  本机 URL:  http://127.0.0.1:{{ oo_port }}/"
        echo "  公网 URL:  https://{{ oo_domain }} (需配反代)"
        echo "  JWT secret: {{ oo_jwt.stdout }}"
        echo ""
        echo "下一步 — 接入 Nextcloud："
        echo "  1. Nextcloud → Apps → Office & Text → ONLYOFFICE → 启用"
        echo "  2. Nextcloud → 管理设置 → ONLYOFFICE"
        echo "       Document Editing Service URL:  https://{{ oo_domain }}/"
        echo "       Secret key:                     {{ oo_jwt.stdout }}"
        echo "       Authorization Header:           Authorization"
        echo "  3. 反代到 {{ oo_domain }}（nginx + LE）—— 见 onlyoffice-docs.md"
        echo ""
        echo "下一步 — 接入 SeaTable / 其它："
        echo "  - 大多数集成都需要 (Document Server URL + JWT secret) 这两项"
        echo "===================================================================="

verify:
  - name: documentserver container running
    cmd: "docker ps --filter name=onlyoffice-docs --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: |
      OnlyOffice 容器没起：
        docker logs onlyoffice-docs | tail -50
        最常见：内存不足（最低 2 GB）/ PG 没就绪

  - name: postgres running
    cmd: "docker ps --filter name=onlyoffice-postgres --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "PG 容器没起。docker logs onlyoffice-postgres"

  - name: rabbitmq running
    cmd: "docker ps --filter name=onlyoffice-rabbitmq --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "RabbitMQ 容器没起。docker logs onlyoffice-rabbitmq"

  - name: healthcheck endpoint
    cmd: "curl -fsS http://127.0.0.1:{{ oo_port }}/healthcheck -o /dev/null"
    hint: "/healthcheck 不响应。容器还在启动？等 30 秒重试。"
