# Playbook: OpenResty (Nginx + Lua)
name: Install OpenResty (Nginx with Lua)
hosts: all

tasks:
  - name: Install prerequisites
    module: package
    args:
      name:
        - wget
        - gnupg
        - software-properties-common
      state: present

  - name: Add OpenResty repository
    module: shell
    args:
      cmd: |
        wget -O - https://openresty.org/package/pubkey.gpg | sudo apt-key add -
        echo "deb http://openresty.org/package/ubuntu $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/openresty.list
        sudo apt-get update -qq
      creates: /etc/apt/sources.list.d/openresty.list

  - name: Install OpenResty
    module: package
    args:
      name: openresty
      state: present

  - name: Enable OpenResty
    module: service
    args:
      name: openresty
      enabled: true
      state: started
