# Playbook: Home Assistant 智能家居中枢
#
# Home Assistant Container 部署（不是 HAOS——HAOS 是裸金属操作系统镜像）。
# 集成 5000+ 设备 / Z-Wave / Zigbee / Wi-Fi / 蓝牙 IoT。
name: Install Home Assistant (Docker)
hosts: all

vars:
  ha_port: 8123
  ha_data_dir: /opt/home-assistant
  ha_timezone: "Asia/Shanghai"
  ha_use_host_network: true              # true = host network（推荐，自动设备发现）
                                          # false = bridge（更安全但部分集成需手动配 IP）

tasks:
  - name: Docker check
    module: shell
    args:
      cmd: command -v docker && docker info >/dev/null 2>&1

  - name: 端口预检
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ ha_port }} "; then
          echo "WARN: Port {{ ha_port }} already in use"
        fi

  - name: 创建数据目录
    module: file
    args:
      path: "{{ ha_data_dir }}"
      state: directory
      mode: "0750"

  - name: SELinux 配置（RHEL 系，让容器访问 USB / DBus）
    module: shell
    args:
      cmd: |
        if command -v getenforce >/dev/null 2>&1 && [ "$(getenforce)" = "Enforcing" ]; then
          sudo setsebool -P container_manage_cgroup on || true
          sudo setsebool -P container_use_devices on || true
        fi
      ignore_errors: true

  - name: 写 docker-compose.yml
    module: copy
    args:
      dest: "{{ ha_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          homeassistant:
            container_name: homeassistant
            image: ghcr.io/home-assistant/home-assistant:stable
            restart: unless-stopped
            privileged: true                  # 需要访问 USB 设备 / 蓝牙 / Z-Wave dongle
            environment:
              TZ: "{{ ha_timezone }}"
            volumes:
              - {{ ha_data_dir }}:/config
              - /etc/localtime:/etc/localtime:ro
              - /run/dbus:/run/dbus:ro          # 蓝牙 / Avahi 集成
            {% if ha_use_host_network %}
            network_mode: host                  # 自动发现 mDNS / SSDP 设备（推荐）
            {% else %}
            ports:
              - "{{ ha_port }}:8123"
            {% endif %}
            healthcheck:
              test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/"]
              interval: 30s
              timeout: 10s
              retries: 3
              start_period: 90s

  - name: 启动
    module: shell
    args:
      cmd: |
        cd {{ ha_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待启动（首次 1-2 分钟）
    module: shell
    args:
      cmd: |
        for i in $(seq 1 90); do
          if curl -fsS http://127.0.0.1:{{ ha_port }}/manifest.json >/dev/null 2>&1; then
            echo "OK"
            exit 0
          fi
          sleep 2
        done
        docker logs --tail 50 homeassistant
        exit 1

  - name: 显示登录信息
    module: shell
    args:
      cmd: |
        echo "================================================="
        echo "Home Assistant 已就绪"
        echo "================================================="
        echo "  URL: http://$(hostname -I | awk '{print $1}'):{{ ha_port }}"
        echo ""
        echo "首次访问会进入引导："
        echo "  1. 创建 Owner 账号"
        echo "  2. 选时区 / 单位 / 国家"
        echo "  3. HA 自动扫描局域网 IoT 设备（mDNS/SSDP）"
        echo "  4. 配置集成（Settings → Devices & Services）"
        echo ""
        echo "推荐："
        echo "  - 装 HACS（社区集成商店）"
        echo "  - 配 MQTT broker（catalog 有 mosquitto-mqtt）"
        echo "================================================="

verify:
  - name: ha container running
    cmd: "docker ps --filter name=homeassistant --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: |
      Home Assistant 没启起来：
        1. 端口 {{ ha_port }} 被占？
        2. SELinux（RHEL）：sudo setsebool -P container_manage_cgroup on
        3. docker logs homeassistant

  - name: ha responds
    cmd: "curl -fsS http://127.0.0.1:{{ ha_port }}/manifest.json"
    hint: "等 1-2 分钟（首次启动慢）。或看 docker logs。"
