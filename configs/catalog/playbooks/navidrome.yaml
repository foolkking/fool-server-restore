# Playbook: Navidrome 音乐流媒体服务器
#
# 自托管 Spotify 替代——Subsonic API 兼容，能用 100+ 第三方 App。
name: Install Navidrome music server
hosts: all

vars:
  nd_music_dir: /srv/music
  nd_data_dir: /opt/navidrome
  nd_port: 4533
  nd_admin_user: "admin"
  nd_admin_password: ""             # 留空 = 自动生成

tasks:
  - name: 验证 Docker
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed." >&2; exit 1
        fi

  - name: 检查音乐目录
    module: shell
    args:
      cmd: |
        if [ ! -d "{{ nd_music_dir }}" ]; then
          echo "WARN: 音乐目录 {{ nd_music_dir }} 不存在 — 将自动创建（空库）"
          sudo mkdir -p "{{ nd_music_dir }}"
        fi

  - name: 端口预检
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ nd_port }} "; then
          echo "WARN: Port {{ nd_port }} 占用："
          ss -tlnp | grep ":{{ nd_port }} "
        fi
    failed_when: false

  - name: 创建数据目录
    module: file
    args:
      path: "{{ nd_data_dir }}"
      state: directory
      mode: "0755"

  - name: 生成 admin 密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ nd_admin_password }}" ]; then
          openssl rand -base64 12 | tr -d '\n='
        else
          echo "{{ nd_admin_password }}"
        fi
    register: nd_pass
    no_log: true

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: "{{ nd_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          navidrome:
            image: deluan/navidrome:latest
            container_name: navidrome
            restart: unless-stopped
            user: "1000:1000"
            ports:
              - "127.0.0.1:{{ nd_port }}:4533"
            environment:
              ND_LOGLEVEL: info
              ND_SCANSCHEDULE: "@every 1h"           # 每小时扫描新音乐
              ND_LASTFM_ENABLED: "false"             # 不联 LastFM
              ND_SPOTIFY_ID: ""
              ND_ENABLETRANSCODINGCONFIG: "true"
              ND_SCANNER_GROUPALBUMRELEASES: "true"
            volumes:
              - {{ nd_data_dir }}/data:/data
              - {{ nd_music_dir }}:/music:ro
            healthcheck:
              test: ["CMD", "wget", "-O-", "-q", "http://localhost:4533/ping"]
              interval: 30s
              timeout: 5s
              retries: 3

  - name: 启动 Navidrome
    module: shell
    args:
      cmd: |
        cd {{ nd_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待启动
    module: shell
    args:
      cmd: |
        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:{{ nd_port }}/ping 2>/dev/null | grep -q OK; then
            echo "OK: Navidrome ready"
            exit 0
          fi
          sleep 2
        done
        echo "ERROR: Navidrome not ready"
        docker logs --tail 30 navidrome
        exit 1

  - name: 创建 admin 账号（首次访问 Web UI 时自动）
    module: shell
    args:
      cmd: |
        echo ""
        echo "首次访问 Web UI 会要求创建 admin —— 用以下凭据："
        echo "  Username: {{ nd_admin_user }}"
        echo "  Password: {{ nd_pass.stdout }}"

  - name: 显示访问信息
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "Navidrome 已就绪"
        echo "===================================================================="
        echo "  本机 URL:      http://127.0.0.1:{{ nd_port }}"
        echo "  音乐目录:       {{ nd_music_dir }} → /music（容器内）"
        echo "  Admin 用户:     {{ nd_admin_user }}"
        echo "  Admin 密码:     {{ nd_pass.stdout }}"
        echo ""
        echo "下一步:"
        echo "  1. 把音乐文件放到 {{ nd_music_dir }}（mp3 / flac / ogg / m4a / 等）"
        echo "  2. 浏览器打开 → 创建 admin 账号（首次）"
        echo "  3. Library → Scan now → 等扫描完成"
        echo "  4. 反代到 https://music.example.com（nginx + LE）"
        echo "  5. 手机 App（Subsonic 协议兼容）："
        echo "     iOS: play:Sub / Substreamer / Amperfy"
        echo "     Android: DSub / Symfonium / Substreamer"
        echo "     URL = 你的 Navidrome 公网域，账号 = admin / 密码"
        echo "===================================================================="

verify:
  - name: navidrome container running
    cmd: "docker ps --filter name=navidrome --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "Navidrome 没起。docker logs navidrome"

  - name: ping endpoint
    cmd: "curl -fsS http://127.0.0.1:{{ nd_port }}/ping -o /dev/null"
    hint: "/ping 不响应。docker logs navidrome"

  - name: music dir mounted
    cmd: "docker exec navidrome ls /music >/dev/null"
    hint: "音乐目录 {{ nd_music_dir }} 挂载失败。检查目录存在 + 权限。"
