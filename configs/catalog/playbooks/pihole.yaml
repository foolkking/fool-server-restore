# Playbook: Pi-hole 网络广告屏蔽
#
# Pi-hole = 本地 DNS 服务器 + 广告 / 追踪域名屏蔽 + Web 管理面板。
# Docker 部署是官方主推方式，避免与 systemd-resolved 冲突。
name: Install Pi-hole (Docker)
hosts: all

vars:
  pihole_admin_password: ""              # 留空 = 自动生成 24 位
  pihole_dns_upstream: "1.1.1.1;1.0.0.1"  # 上游 DNS（分号分隔）
  pihole_web_port: 8081                  # Web UI 端口（不要与 nginx 冲突）
  pihole_dns_port: 53
  pihole_timezone: "Asia/Shanghai"
  pihole_dnssec: true

tasks:
  - name: Docker 已装？
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed. Run docker-host-profile first." >&2
          exit 1
        fi

  - name: 端口预检（53 + Web）
    module: shell
    args:
      cmd: |
        # 53 端口经常被 systemd-resolved 占用
        if ss -tlnp | grep -q ':{{ pihole_dns_port }} '; then
          PROC=$(ss -tlnp | grep ":{{ pihole_dns_port }} " | head -1)
          echo "WARN: Port {{ pihole_dns_port }} 已被占用：$PROC"
          echo "      systemd-resolved 是常见占用者。Pi-hole 部署需先停用："
          echo "      sudo systemctl disable --now systemd-resolved"
          echo "      sudo unlink /etc/resolv.conf"
          echo "      echo 'nameserver 1.1.1.1' | sudo tee /etc/resolv.conf"
        fi

        if ss -tlnp | grep -q ':{{ pihole_web_port }} '; then
          echo "WARN: Web 端口 {{ pihole_web_port }} 被占用"
        fi

  - name: 关闭 systemd-resolved（如启用）
    module: shell
    args:
      cmd: |
        if systemctl is-active --quiet systemd-resolved; then
          sudo systemctl disable --now systemd-resolved
          # 替换 /etc/resolv.conf 为静态文件（不能再走 systemd-resolved 的 stub）
          if [ -L /etc/resolv.conf ]; then
            sudo unlink /etc/resolv.conf
            echo 'nameserver 1.1.1.1' | sudo tee /etc/resolv.conf
            echo 'nameserver 8.8.8.8' | sudo tee -a /etc/resolv.conf
          fi
        fi

  - name: 创建数据目录
    module: file
    args:
      path: "{{ item }}"
      state: directory
      mode: "0750"
    loop:
      - /opt/pihole/etc-pihole
      - /opt/pihole/etc-dnsmasq

  - name: 生成密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ pihole_admin_password }}" ]; then
          openssl rand -base64 18 | tr -d '\n'
        else
          echo "{{ pihole_admin_password }}"
        fi
    register: pihole_pass
    no_log: true

  - name: 写 docker-compose.yml
    module: copy
    args:
      dest: /opt/pihole/docker-compose.yml
      mode: "0640"
      content: |
        services:
          pihole:
            container_name: pihole
            image: pihole/pihole:latest
            restart: unless-stopped
            ports:
              - "{{ pihole_dns_port }}:53/tcp"
              - "{{ pihole_dns_port }}:53/udp"
              - "{{ pihole_web_port }}:80/tcp"
            environment:
              TZ: "{{ pihole_timezone }}"
              WEBPASSWORD: "{{ pihole_pass.stdout }}"
              DNS1: "{{ pihole_dns_upstream.split(';')[0] }}"
              DNS2: "{{ pihole_dns_upstream.split(';')[1] if ';' in pihole_dns_upstream else '' }}"
              DNSSEC: "{{ 'true' if pihole_dnssec else 'false' }}"
              VIRTUAL_HOST: pihole.local
              FTLCONF_LOCAL_IPV4: 0.0.0.0
            volumes:
              - /opt/pihole/etc-pihole:/etc/pihole
              - /opt/pihole/etc-dnsmasq:/etc/dnsmasq.d
            cap_add:
              - NET_ADMIN
              - SYS_NICE
            healthcheck:
              test: ["CMD-SHELL", "dig @127.0.0.1 -p 53 google.com +short || exit 1"]
              interval: 30s
              timeout: 5s
              retries: 3

  - name: 启动 Pi-hole
    module: shell
    args:
      cmd: |
        cd /opt/pihole
        docker compose pull
        docker compose up -d

  - name: 等待启动
    module: shell
    args:
      cmd: |
        for i in $(seq 1 30); do
          if docker exec pihole pihole status >/dev/null 2>&1; then
            echo "OK"
            exit 0
          fi
          sleep 2
        done
        echo "Failed to start"
        docker logs --tail 50 pihole
        exit 1

  - name: 显示登录信息
    module: shell
    args:
      cmd: |
        echo "=================================================================="
        echo "Pi-hole 已就绪"
        echo "=================================================================="
        echo "  Admin URL:    http://$(hostname -I | awk '{print $1}'):{{ pihole_web_port }}/admin/"
        echo "  Password:     {{ pihole_pass.stdout }}"
        echo ""
        echo "下一步："
        echo "  1. 路由器 DHCP 设 DNS = 本机 IP（让全网设备走 Pi-hole）"
        echo "  2. 或单设备改 DNS = 本机 IP 测试"
        echo "  3. 浏览有广告的页面，回 Pi-hole 看 Query Log 看挡住的请求"
        echo "=================================================================="

verify:
  - name: pihole container running
    cmd: "docker ps --filter name=pihole --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: |
      Pi-hole 容器没跑起来。常见原因：
        1. 53 端口仍被 systemd-resolved / dnsmasq 占用
           → sudo systemctl disable --now systemd-resolved
        2. SELinux（RHEL）
           → sudo setsebool -P container_manage_cgroup on
        3. 看错误：docker logs --tail 50 pihole

  - name: DNS resolution works
    cmd: "dig @127.0.0.1 -p {{ pihole_dns_port }} google.com +short"
    hint: |
      Pi-hole DNS 不响应：
        1. 容器健康？docker inspect --format='{{ '{{' }}.State.Health.Status{{ '}}' }}' pihole
        2. 上游 DNS 通？docker exec pihole dig {{ pihole_dns_upstream.split(';')[0] }} google.com

  - name: web admin reachable
    cmd: "curl -fsS http://127.0.0.1:{{ pihole_web_port }}/admin/ -o /dev/null"
    hint: "Web admin 不可达。看容器日志 docker logs pihole | grep -i error"
