# Playbook: Seafile 文件同步
name: Install Seafile
hosts: all

vars:
  sf_data_dir: /opt/seafile
  sf_hostname: "files.example.com"
  sf_admin_email: "admin@example.com"
  sf_admin_password: ""
  sf_db_password: ""
  sf_port: 8082

tasks:
  - name: 验证 Docker
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed." >&2; exit 1
        fi

  - name: 端口预检
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ sf_port }} "; then
          echo "WARN: Port {{ sf_port }} 占用："
          ss -tlnp | grep ":{{ sf_port }} "
        fi
    failed_when: false

  - name: 创建目录
    module: file
    args:
      path: "{{ sf_data_dir }}/{{ item }}"
      state: directory
      mode: "0755"
    loop:
      - data
      - mariadb-data

  - name: 生成密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ sf_admin_password }}" ]; then
          openssl rand -base64 12 | tr -d '\n='
        else
          echo "{{ sf_admin_password }}"
        fi
    register: sf_pass
    no_log: true

  - name: 生成 DB 密码
    module: shell
    args:
      cmd: |
        if [ -z "{{ sf_db_password }}" ]; then
          openssl rand -base64 18 | tr -d '\n='
        else
          echo "{{ sf_db_password }}"
        fi
    register: sf_db_pass
    no_log: true

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: "{{ sf_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          seafile-db:
            image: mariadb:10.11
            container_name: seafile-db
            restart: unless-stopped
            environment:
              MYSQL_ROOT_PASSWORD: "{{ sf_db_pass.stdout }}"
              MYSQL_LOG_CONSOLE: "true"
            volumes:
              - {{ sf_data_dir }}/mariadb-data:/var/lib/mysql
            healthcheck:
              test: ["CMD", "mysqladmin", "ping", "-uroot", "-p{{ sf_db_pass.stdout }}"]
              interval: 10s

          seafile-memcached:
            image: memcached:1.6
            container_name: seafile-memcached
            restart: unless-stopped
            entrypoint: memcached -m 256

          seafile:
            image: seafileltd/seafile-mc:latest
            container_name: seafile
            restart: unless-stopped
            depends_on:
              seafile-db:
                condition: service_healthy
              seafile-memcached:
                condition: service_started
            ports:
              - "127.0.0.1:{{ sf_port }}:80"
            volumes:
              - {{ sf_data_dir }}/data:/shared
            environment:
              DB_HOST: seafile-db
              DB_ROOT_PASSWD: "{{ sf_db_pass.stdout }}"
              TIME_ZONE: "Asia/Shanghai"
              SEAFILE_ADMIN_EMAIL: "{{ sf_admin_email }}"
              SEAFILE_ADMIN_PASSWORD: "{{ sf_pass.stdout }}"
              SEAFILE_SERVER_HOSTNAME: "{{ sf_hostname }}"
              SEAFILE_SERVER_LETSENCRYPT: "false"          # 让 nginx 反代处理
              FORCE_HTTPS_IN_CONF: "false"                 # 反代会处理

  - name: 启动
    module: shell
    args:
      cmd: |
        cd {{ sf_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待启动（首次较慢——DB schema migration）
    module: shell
    args:
      cmd: |
        echo "等待 Seafile 启动（首次约 60-180s）..."
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:{{ sf_port }}/ -o /dev/null 2>&1; then
            echo "OK: Seafile ready"
            exit 0
          fi
          sleep 3
        done
        echo "ERROR: Seafile not ready"
        docker logs --tail 50 seafile
        exit 1

  - name: 显示访问信息
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "Seafile 已就绪"
        echo "===================================================================="
        echo "  本机 URL:      http://127.0.0.1:{{ sf_port }}"
        echo "  Hostname:      {{ sf_hostname }}"
        echo "  Admin 邮箱:    {{ sf_admin_email }}"
        echo "  Admin 密码:    {{ sf_pass.stdout }}"
        echo ""
        echo "下一步:"
        echo "  1. 反代到 https://{{ sf_hostname }}（nginx + LE）"
        echo "  2. 反代后改 docker-compose.yml: SEAFILE_SERVER_PROTOCOL=https"
        echo "  3. 浏览器登录 → System Admin → 加用户 / Group"
        echo "  4. 桌面客户端：https://www.seafile.com/en/download/"
        echo "  5. iOS / Android: 应用商店搜 'Seafile'"
        echo "===================================================================="

verify:
  - name: container running
    cmd: "docker ps --filter name=seafile --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: |
      Seafile 没起：
        docker logs seafile | tail -100
        最常见：DB schema migration 失败 / memcached 没起

  - name: db running
    cmd: "docker ps --filter name=seafile-db --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "MariaDB 没起。docker logs seafile-db"

  - name: web ui responds
    cmd: "curl -fsS http://127.0.0.1:{{ sf_port }}/ -o /dev/null"
    hint: "Web UI 不响应。docker logs seafile"
