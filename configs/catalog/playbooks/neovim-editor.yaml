# Playbook: Neovim 编辑器
#
# 包名审查矩阵 (§7.5.2)：
#   neovim — Debian ✅；RHEL 需 EPEL ✅（NEEDS_EPEL 已加）
#   vim    — 两边默认仓库 ✅
#   git    — 两边默认仓库 ✅
name: Install Neovim with basic config
hosts: all

tasks:
  - name: Install Neovim
    module: package
    args:
      name:
        - neovim
        - vim
        - git
      state: present
      ignore_missing: true

  - name: Verify Neovim
    module: shell
    args:
      cmd: "nvim --version | head -1"
