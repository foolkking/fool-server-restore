# Playbook: Grafana Loki 日志聚合
#
# Loki 是 "Prometheus for logs"——索引日志的元数据（label）而不是内容，
# 比 Elasticsearch 便宜 10 倍。配 Grafana 的 Loki 数据源即可查询。
name: Install Grafana Loki log aggregation
hosts: all

vars:
  http_port: 3100
  bind_address: "127.0.0.1"
  retention_period: "744h"

tasks:
  - name: Install dependencies
    module: package
    args:
      name: ["curl", "unzip"]
      state: present

  - name: Create loki user + dirs
    module: shell
    args:
      cmd: |
        getent passwd loki >/dev/null || sudo useradd --system --no-create-home --shell /usr/sbin/nologin loki
        sudo mkdir -p /etc/loki /var/lib/loki/{chunks,tsdb-index,tsdb-cache,wal,rules}
        sudo chown -R loki:loki /etc/loki /var/lib/loki

  - name: Download Loki binary (fixed version)
    module: shell
    args:
      cmd: |
        if [ ! -f /usr/local/bin/loki ]; then
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64) BIN_ARCH=amd64 ;;
            aarch64) BIN_ARCH=arm64 ;;
            *) echo "unsupported arch: $ARCH"; exit 1 ;;
          esac
          VER="3.2.1"
          cd /tmp
          curl -fsSL "https://github.com/grafana/loki/releases/download/v${VER}/loki-linux-${BIN_ARCH}.zip" -o loki.zip
          unzip -o loki.zip
          sudo mv loki-linux-${BIN_ARCH} /usr/local/bin/loki
          sudo chmod +x /usr/local/bin/loki
          rm loki.zip
        fi
      creates: /usr/local/bin/loki

  - name: Render /etc/loki/loki.yml
    module: copy
    args:
      dest: /etc/loki/loki.yml
      content: |
        # /etc/loki/loki.yml — managed by EnvForge
        auth_enabled: false

        server:
          http_listen_address: {{ bind_address }}
          http_listen_port: {{ http_port }}
          grpc_listen_port: 9096

        common:
          path_prefix: /var/lib/loki
          storage:
            filesystem:
              chunks_directory: /var/lib/loki/chunks
              rules_directory: /var/lib/loki/rules
          replication_factor: 1
          ring:
            instance_addr: 127.0.0.1
            kvstore:
              store: inmemory

        schema_config:
          configs:
            - from: 2024-01-01
              store: tsdb
              object_store: filesystem
              schema: v13
              index:
                prefix: index_
                period: 24h

        limits_config:
          retention_period: {{ retention_period }}
          allow_structured_metadata: true

        compactor:
          working_directory: /var/lib/loki/compactor
          retention_enabled: true
          retention_delete_delay: 2h
          delete_request_store: filesystem

        analytics:
          reporting_enabled: false

  - name: Render systemd unit
    module: copy
    args:
      dest: /etc/systemd/system/loki.service
      content: |
        [Unit]
        Description=Grafana Loki
        After=network-online.target

        [Service]
        User=loki
        Group=loki
        ExecStart=/usr/local/bin/loki -config.file=/etc/loki/loki.yml
        Restart=on-failure

        [Install]
        WantedBy=multi-user.target

  - name: Enable and start loki
    module: shell
    args:
      cmd: "sudo systemctl daemon-reload && sudo systemctl enable --now loki"

verify:
  - name: loki service is active
    cmd: "systemctl is-active --quiet loki"
    hint: "服务未启动。看 'sudo journalctl -u loki -n 30'。常见：loki.yml 语法错（YAML 缩进）/ 数据目录权限不是 loki:loki。"
  - name: ready endpoint
    cmd: "for i in 1 2 3 4 5; do curl -fsS -m 3 http://127.0.0.1:{{ http_port }}/ready 2>/dev/null && exit 0; sleep 2; done; exit 1"
    expect_stdout: "ready"
    hint: "Loki 没就绪：服务可能还在初始化（首次启动需 5-15 秒），或 bind_address 不对。"
