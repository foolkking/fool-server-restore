# Playbook: HashiCorp Vault 密钥管理
#
# Vault 是企业级 secret 管理系统：存密钥/证书/数据库密码，提供 API 拿。
# 此 Playbook 装 vault 二进制 + systemd unit + 默认 file storage 配置。
# 装好后需要手动 `vault operator init` 解封，初始化密封密钥。
name: Install HashiCorp Vault
hosts: all

vars:
  listen_address: "127.0.0.1"
  api_port: 8200
  storage_path: "/var/lib/vault/data"
  dev_mode: false

tasks:
  - name: Install dependencies
    module: package
    args:
      name: ["curl", "gnupg"]
      state: present

  - name: Add HashiCorp apt repo (Debian/Ubuntu)
    module: shell
    args:
      cmd: |
        if command -v apt-get >/dev/null 2>&1; then
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg --yes
          CODENAME=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $CODENAME main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq
        fi
      creates: /etc/apt/sources.list.d/hashicorp.list

  - name: Add HashiCorp yum repo (RHEL/Anolis)
    module: shell
    args:
      cmd: |
        if command -v dnf >/dev/null 2>&1 && [ ! -f /etc/yum.repos.d/hashicorp.repo ]; then
          sudo dnf config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
        fi
      creates: /etc/yum.repos.d/hashicorp.repo

  - name: Install Vault
    module: package
    args:
      name: vault
      state: present

  - name: Render /etc/vault.d/vault.hcl (production mode with file storage)
    module: copy
    args:
      dest: /etc/vault.d/vault.hcl
      content: |
        # /etc/vault.d/vault.hcl — managed by EnvForge

        ui = true

        storage "file" {
          path = "{{ storage_path }}"
        }

        listener "tcp" {
          address     = "{{ listen_address }}:{{ api_port }}"
          tls_disable = 1
        }

        api_addr     = "http://{{ listen_address }}:{{ api_port }}"
        cluster_addr = "http://{{ listen_address }}:{{ api_port }}/cluster"

        disable_mlock = true

  - name: Create storage path
    module: file
    args:
      path: "{{ storage_path }}"
      state: directory
      owner: vault
      group: vault
      mode: "0750"

  - name: Enable and start Vault
    module: service
    args:
      name: vault
      enabled: true
      state: restarted

verify:
  - name: vault service is active
    cmd: "systemctl is-active --quiet vault"
    hint: "服务未启动。看 'sudo journalctl -u vault -n 30'。常见：vault.hcl 语法错 / storage_path 权限不是 vault:vault。"
  - name: Vault API is reachable (sealed status check)
    cmd: "curl -fsS -m 5 http://{{ listen_address }}:{{ api_port }}/v1/sys/seal-status 2>&1 | grep -E 'sealed|initialized'"
    hint: "Vault API 不可达：服务可能没起来或 listen_address 不对。"
  - name: Vault is sealed (expected on first install — needs manual init)
    cmd: "curl -fsS http://{{ listen_address }}:{{ api_port }}/v1/sys/seal-status 2>&1 | grep -E '\"sealed\":(true|false)'"
    hint: "首次安装 Vault 是 sealed 且 initialized=false 状态。**接下来你必须手动初始化**：见 guide。"
