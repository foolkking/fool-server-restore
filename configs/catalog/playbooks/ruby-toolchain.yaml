# Playbook: Ruby + Bundler
#
# 包名审查矩阵 (§7.5.2)：
#   ruby            — Debian/Ubuntu ✅；RHEL 默认仓库 ✅
#   ruby-dev        — Debian/Ubuntu ✅；RHEL → ruby-devel（PACKAGE_ALIASES 已映射）
#   build-essential — Debian/Ubuntu ✅；RHEL → @development-tools（已映射）
#   zlib1g-dev      — Debian/Ubuntu ✅；RHEL → zlib-devel（已映射）
#   libssl-dev      — Debian/Ubuntu ✅；RHEL → openssl-devel（已映射）
name: Install Ruby and Bundler
hosts: all

tasks:
  - name: Install Ruby + dev headers + build essentials
    module: package
    args:
      name:
        - ruby
        - ruby-dev
        - build-essential
        - zlib1g-dev
        - libssl-dev
      state: present
      ignore_missing: true

  - name: Install Bundler gem
    module: shell
    args:
      cmd: "sudo gem install bundler --no-document"

verify:
  - name: ruby works
    cmd: "ruby --version"
    expect_stdout: "ruby"
    hint: "Ruby 没装上。检查 'apt-get install ruby' 或 'dnf install ruby' 输出。"
  - name: gem works
    cmd: "gem --version"
    hint: "gem 没装上：通常 ruby 包就包含了 gem，包源有问题。"
  - name: bundler works
    cmd: "bundle --version"
    hint: "Bundler 没装上：'sudo gem install bundler' 失败，可能 RubyGems 网络问题（国内服务器需配镜像）。"
