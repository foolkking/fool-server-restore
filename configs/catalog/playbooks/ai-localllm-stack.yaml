# Playbook: 本地 AI 推理栈（Ollama + Open WebUI + SearXNG）
#
# 完全本地的 ChatGPT 替代——无 API 费用、数据不出本机。
# Ollama 跑 LLM，Open WebUI 提供 ChatGPT 风格界面，SearXNG 给 AI 补充 web 检索。
name: Install AI local LLM stack
hosts: all

vars:
  ai_data_dir: /opt/ai-stack
  ai_webui_port: 3030
  ai_ollama_port: 11434
  ai_searxng_port: 8888
  ai_default_model: "llama3.2:3b"               # 小模型（2GB），适合 4GB+ RAM 机器

tasks:
  - name: Docker check
    module: shell
    args:
      cmd: command -v docker && docker info >/dev/null 2>&1

  - name: 内存预检（LLM 重）
    module: shell
    args:
      cmd: |
        TOTAL_MB=$(free -m | awk '/^Mem:/{print $2}')
        if [ "$TOTAL_MB" -lt 7500 ]; then
          echo "WARN: 物理内存 ${TOTAL_MB}MB < 推荐 8GB"
          echo "  小模型（如 llama3.2:3b 占 2GB）能跑，大模型（70B+）需 64GB+ 或 GPU"
        fi

  - name: 检查 GPU（NVIDIA）
    module: shell
    args:
      cmd: |
        if command -v nvidia-smi >/dev/null 2>&1; then
          nvidia-smi -L
          echo "GPU 可用——Ollama 自动用 CUDA 加速"
        else
          echo "未检测到 NVIDIA GPU——Ollama 用 CPU（慢但能跑）"
        fi
      ignore_errors: true

  - name: 创建数据目录
    module: file
    args:
      path: "{{ item }}"
      state: directory
      mode: "0750"
    loop:
      - "{{ ai_data_dir }}"
      - "{{ ai_data_dir }}/ollama"
      - "{{ ai_data_dir }}/open-webui"
      - "{{ ai_data_dir }}/searxng"

  - name: 写 SearXNG settings.yml
    module: copy
    args:
      dest: "{{ ai_data_dir }}/searxng/settings.yml"
      content: |
        use_default_settings: true

        general:
          debug: false
          instance_name: "EnvForge SearXNG"

        search:
          safe_search: 0
          autocomplete: ""
          default_lang: ""
          formats:
            - html
            - json

        server:
          port: 8080
          bind_address: 0.0.0.0
          secret_key: "$(openssl rand -hex 32)"
          base_url: false
          image_proxy: true

        ui:
          static_use_hash: true

  - name: 写 docker-compose.yml
    module: copy
    args:
      dest: "{{ ai_data_dir }}/docker-compose.yml"
      mode: "0640"
      content: |
        services:
          ollama:
            image: ollama/ollama:latest
            container_name: ollama
            restart: unless-stopped
            ports:
              - "127.0.0.1:{{ ai_ollama_port }}:11434"
            volumes:
              - {{ ai_data_dir }}/ollama:/root/.ollama
            # GPU 支持（需先装 nvidia-container-toolkit）
            # deploy:
            #   resources:
            #     reservations:
            #       devices:
            #         - driver: nvidia
            #           count: all
            #           capabilities: [gpu]

          open-webui:
            image: ghcr.io/open-webui/open-webui:main
            container_name: open-webui
            restart: unless-stopped
            ports:
              - "127.0.0.1:{{ ai_webui_port }}:8080"
            environment:
              OLLAMA_BASE_URL: "http://ollama:11434"
              WEBUI_SECRET_KEY: "$(openssl rand -hex 32)"
              ENABLE_RAG_WEB_SEARCH: "true"
              RAG_WEB_SEARCH_ENGINE: "searxng"
              SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
              ENABLE_OPENAI_API: "false"            # 默认仅 Ollama
              ANONYMIZED_TELEMETRY: "false"
            volumes:
              - {{ ai_data_dir }}/open-webui:/app/backend/data
            depends_on:
              - ollama

          searxng:
            image: searxng/searxng:latest
            container_name: searxng
            restart: unless-stopped
            ports:
              - "127.0.0.1:{{ ai_searxng_port }}:8080"
            volumes:
              - {{ ai_data_dir }}/searxng:/etc/searxng:rw

  - name: 启动栈
    module: shell
    args:
      cmd: |
        cd {{ ai_data_dir }}
        docker compose pull
        docker compose up -d

  - name: 等待 Ollama 启动
    module: shell
    args:
      cmd: |
        for i in $(seq 1 60); do
          if curl -fsS http://127.0.0.1:{{ ai_ollama_port }}/api/version >/dev/null 2>&1; then
            echo "OK"
            exit 0
          fi
          sleep 2
        done
        docker logs --tail 30 ollama
        exit 1

  - name: 拉默认模型（首次会下载，可能数 GB）
    module: shell
    args:
      cmd: |
        echo "拉取默认模型 {{ ai_default_model }}（首次下载可能 1-5 分钟，按模型大小）..."
        docker exec ollama ollama pull {{ ai_default_model }}

  - name: 显示信息
    module: shell
    args:
      cmd: |
        echo "================================================="
        echo "AI 本地推理栈 已就绪"
        echo "================================================="
        echo "  Open WebUI:  http://$(hostname -I | awk '{print $1}'):{{ ai_webui_port }}/"
        echo "  Ollama API:  http://127.0.0.1:{{ ai_ollama_port }}/api"
        echo "  SearXNG:     http://127.0.0.1:{{ ai_searxng_port }}/"
        echo ""
        echo "已安装模型："
        docker exec ollama ollama list
        echo ""
        echo "下一步："
        echo "  1. 浏览器打开 Open WebUI → 注册账号（首个 = admin）"
        echo "  2. 选模型对话"
        echo "  3. 装更多模型：docker exec ollama ollama pull <name>"
        echo "     - 推荐：llama3.1:8b (4.7GB) / qwen2.5:7b (4.4GB) / phi3:mini (2.3GB)"
        echo "================================================="

verify:
  - name: ollama running
    cmd: "docker ps --filter name=ollama --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "Ollama 没起。docker logs ollama"

  - name: open-webui running
    cmd: "docker ps --filter name=open-webui --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: "Open WebUI 没起。docker logs open-webui"

  - name: ollama api responds
    cmd: "curl -fsS http://127.0.0.1:{{ ai_ollama_port }}/api/version | grep -q version"
    hint: "Ollama API 不响应。等启动 30s 重试。"
