# Playbook: Vaultwarden 密码管理器
#
# Vaultwarden 是 Bitwarden 服务端的 Rust 重写——单容器、SQLite、~100 MB RAM。
# 完全兼容官方 Bitwarden 客户端（浏览器插件、手机 App、桌面）。
#
# 部署方式：Docker 单容器（官方推荐）。需要先装 docker-host-profile。
name: Install Vaultwarden password manager (Docker)
hosts: all

vars:
  vw_domain: "vault.example.com"
  vw_admin_token: ""                    # 留空 = 自动生成 64 位
  vw_port: 8086
  vw_data_dir: /opt/vaultwarden/data
  vw_signups_allowed: false
  vw_smtp_host: ""
  vw_smtp_port: 587
  vw_smtp_security: "starttls"
  vw_smtp_from: ""
  vw_smtp_username: ""
  vw_smtp_password: ""

tasks:
  - name: 检查 Docker 已安装（前置）
    module: shell
    args:
      cmd: "command -v docker && docker info >/dev/null 2>&1"
    failed_when: false
    register: docker_check

  - name: 验证 Docker 可用
    module: shell
    args:
      cmd: |
        if ! command -v docker >/dev/null 2>&1; then
          echo "ERROR: Docker not installed. Run docker-host-profile playbook first." >&2
          exit 1
        fi

  - name: 创建数据目录
    module: file
    args:
      path: "{{ vw_data_dir }}"
      state: directory
      mode: "0750"

  - name: 端口预检（{{ vw_port }} 是否被占用）
    module: shell
    args:
      cmd: |
        if ss -tlnp 2>/dev/null | grep -q ":{{ vw_port }} "; then
          echo "WARN: Port {{ vw_port }} already in use:"
          ss -tlnp | grep ":{{ vw_port }} "
          # 不直接 fail，可能是已有的 vaultwarden
        fi

  - name: 生成 admin token（若用户未填）
    module: shell
    args:
      cmd: |
        if [ -z "{{ vw_admin_token }}" ]; then
          openssl rand -base64 48 | tr -d '\n'
        else
          echo "{{ vw_admin_token }}"
        fi
    register: admin_token_value
    no_log: true

  - name: 备份旧 docker-compose.yml（如存在）
    module: shell
    args:
      cmd: |
        if [ -f /opt/vaultwarden/docker-compose.yml ]; then
          cp /opt/vaultwarden/docker-compose.yml /opt/vaultwarden/docker-compose.yml.envforge.bak.$(date +%s)
        fi

  - name: 写入 docker-compose.yml
    module: copy
    args:
      dest: /opt/vaultwarden/docker-compose.yml
      mode: "0640"
      content: |
        services:
          vaultwarden:
            image: vaultwarden/server:latest
            container_name: vaultwarden
            restart: unless-stopped
            environment:
              DOMAIN: "https://{{ vw_domain }}"
              ADMIN_TOKEN: "{{ admin_token_value.stdout }}"
              SIGNUPS_ALLOWED: "{{ 'true' if vw_signups_allowed else 'false' }}"
              ROCKET_PORT: "80"
              SHOW_PASSWORD_HINT: "false"
              WEB_VAULT_ENABLED: "true"
              WEBSOCKET_ENABLED: "true"
              SMTP_HOST: "{{ vw_smtp_host }}"
              SMTP_PORT: "{{ vw_smtp_port }}"
              SMTP_SECURITY: "{{ vw_smtp_security }}"
              SMTP_FROM: "{{ vw_smtp_from }}"
              SMTP_USERNAME: "{{ vw_smtp_username }}"
              SMTP_PASSWORD: "{{ vw_smtp_password }}"
              LOG_LEVEL: warn
              EXTENDED_LOGGING: "true"
              SENDS_ALLOWED: "true"
              EMERGENCY_ACCESS_ALLOWED: "true"
              DATA_FOLDER: /data
            ports:
              - "127.0.0.1:{{ vw_port }}:80"
            volumes:
              - {{ vw_data_dir }}:/data
            healthcheck:
              test: ["CMD", "curl", "-fsS", "http://127.0.0.1/alive"]
              interval: 30s
              timeout: 5s
              retries: 3

  - name: 启动 Vaultwarden 容器
    module: shell
    args:
      cmd: |
        cd /opt/vaultwarden
        docker compose pull
        docker compose up -d

  - name: 等待容器健康
    module: shell
    args:
      cmd: |
        for i in $(seq 1 30); do
          STATUS=$(docker inspect --format='{{ "{{" }}.State.Health.Status{{ "}}" }}' vaultwarden 2>/dev/null || echo none)
          if [ "$STATUS" = "healthy" ]; then
            echo "OK: container healthy"
            exit 0
          fi
          sleep 2
        done
        echo "ERROR: container not healthy after 60s"
        docker logs --tail 50 vaultwarden
        exit 1

  - name: 显示 admin token（仅一次）
    module: shell
    args:
      cmd: |
        echo "===================================================================="
        echo "Vaultwarden 已就绪"
        echo "===================================================================="
        echo "  访问 URL:    http://127.0.0.1:{{ vw_port }}/  (建议挂反代 + HTTPS)"
        echo "  Admin URL:   http://127.0.0.1:{{ vw_port }}/admin"
        echo "  Admin Token: {{ admin_token_value.stdout }}"
        echo ""
        echo "下一步:"
        echo "  1. 反代到 {{ vw_domain }}（nginx-web-service + certbot-ssl）"
        echo "  2. 浏览器打开 https://{{ vw_domain }}/admin 输入上面的 token 登录"
        echo "  3. 创建普通用户账号 → 浏览器装 Bitwarden 插件 → 改 server URL 到 {{ vw_domain }}"
        echo "  4. WebSocket 必开（实时同步）—— 见 vaultwarden.md 反代模板"
        echo "===================================================================="

verify:
  - name: vaultwarden container running
    cmd: "docker ps --filter name=vaultwarden --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q Up"
    hint: |
      Vaultwarden 容器没运行起来。
        1. docker logs vaultwarden 看错误
        2. 数据目录 {{ vw_data_dir }} 权限对吗？
        3. 端口 {{ vw_port }} 被占？sudo ss -tlnp | grep :{{ vw_port }}
        4. SELinux（RHEL）阻止？sudo setsebool -P container_manage_cgroup on

  - name: vaultwarden alive endpoint
    cmd: "curl -fsS http://127.0.0.1:{{ vw_port }}/alive"
    hint: |
      Vaultwarden 已启动但 /alive 不响应。等 10 秒后重试；持续不通看：
        docker logs --tail 50 vaultwarden

  - name: data directory exists
    cmd: "test -d {{ vw_data_dir }}"
    hint: "数据目录 {{ vw_data_dir }} 不存在，可能 file 模块未跑成功。"
