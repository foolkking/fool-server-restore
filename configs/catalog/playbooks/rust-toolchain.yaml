# Playbook: Rust 工具链 (rustup)
#
# rustup 的安装脚本会自动写 ~/.cargo/env 和 ~/.bashrc/~/.profile。但我们额外用
# env_path 显式确保 cargo bin 在所有 shell（bash/zsh/fish）的 PATH 里 — rustup
# 默认只改 .bashrc/.profile，zsh/fish 用户得自己处理。
name: Install Rust toolchain via rustup
hosts: all

tasks:
  - name: Install build dependencies (rustup needs curl + cc + ssl)
    # 包名审查矩阵 (§7.5.2)：
    #   build-essential / libssl-dev — Debian/Ubuntu 包名；
    #     PACKAGE_ALIASES 已映射到 RHEL 的 @development-tools / openssl-devel
    #   pkg-config — Debian/Ubuntu；RHEL 包名 pkgconfig（已映射）
    module: package
    args:
      name:
        - curl
        - build-essential
        - pkg-config
        - libssl-dev
      state: present
      ignore_missing: true

  - name: Install rustup non-interactively (idempotent via creates)
    module: shell
    args:
      cmd: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path"
      creates: $HOME/.cargo/bin/rustc

  - name: Add cargo bin to PATH (cross-shell)
    module: env_path
    args:
      name: PATH
      value: $HOME/.cargo/bin
      mode: append
      scope: user
      id: rust-cargo

verify:
  - name: rustc command works
    cmd: "rustc --version"
    expect_stdout: "rustc"
    login: true
    hint: "rustc 找不到。env_path 已经把 ~/.cargo/bin 写到 .bashrc/.zshenv，verify 用 login shell 启动应该能读到。"
  - name: cargo command works
    cmd: "cargo --version"
    login: true
    hint: "同上。"
