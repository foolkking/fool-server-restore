version: "3.8"

# EnvForge demo / sandbox — full self-contained playground.
#
# Brings up:
#   - envforge:    the main EnvForge UI/API on http://localhost:5173
#   - sandbox-vm:  an Ubuntu 22.04 container with sshd running on port 2222,
#                  pre-seeded with passwordless sudo for the "demo" user.
#
# Login to envforge → register account → in VM Manager add connection:
#   host: sandbox-vm    (or localhost if port-forwarded)
#   port: 22            (inside the docker network)
#   user: demo
#   password: demo
#
# Now you can run any catalog Playbook against the sandbox safely.
#
# Usage:
#   ENVFORGE_MASTER_KEY=$(node -e "console.log(require('crypto').randomBytes(32).toString('base64'))") \
#     docker compose -f docker-compose.demo.yml up -d
#
# Tear-down:
#   docker compose -f docker-compose.demo.yml down -v

services:
  envforge:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: envforge:latest
    container_name: envforge-demo
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - envforge_demo_data:/app/data
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5173
      SERVE_WEB: "1"
      ENVFORGE_MASTER_KEY: ${ENVFORGE_MASTER_KEY:?ENVFORGE_MASTER_KEY required}
      ENVFORGE_ADMIN_NAMES: fool,demo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - envforge-net

  sandbox-vm:
    image: ubuntu:22.04
    container_name: envforge-sandbox-vm
    restart: unless-stopped
    ports:
      - "2222:22"
    networks:
      - envforge-net
    # Seed openssh-server, demo user, passwordless sudo, then run sshd in the foreground.
    command: |
      bash -c '
        set -e
        export DEBIAN_FRONTEND=noninteractive
        if [ ! -f /var/.envforge-init ]; then
          apt-get update -qq
          apt-get install -y -qq openssh-server sudo curl wget vim nano \
            apt-transport-https ca-certificates gnupg lsb-release
          mkdir -p /var/run/sshd
          useradd -m -s /bin/bash demo || true
          echo "demo:demo" | chpasswd
          echo "demo ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/demo
          chmod 0440 /etc/sudoers.d/demo
          # Allow password auth for the demo
          sed -i "s/^#\\?PasswordAuthentication.*/PasswordAuthentication yes/" /etc/ssh/sshd_config
          sed -i "s/^#\\?PermitRootLogin.*/PermitRootLogin no/" /etc/ssh/sshd_config
          touch /var/.envforge-init
        fi
        exec /usr/sbin/sshd -D -e
      '

volumes:
  envforge_demo_data:
    driver: local

networks:
  envforge-net:
    driver: bridge
