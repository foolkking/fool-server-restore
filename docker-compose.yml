# EnvForge — Self-hosted Linux server configuration management platform
#
# Usage:
#   1. cp .env.example .env
#   2. Set ENVFORGE_MASTER_KEY (32 bytes base64; see .env.example for generation)
#   3. docker compose up -d
#   4. Open http://localhost:5173
#
# Production: front with nginx + Let's Encrypt — see docs/DEPLOY.md section 6.

services:
  envforge:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: envforge:latest
    container_name: envforge
    restart: unless-stopped
    ports:
      # Bind only to localhost in production (nginx reverse-proxy in front).
      # Change to "5173:5173" for direct access (NOT recommended for public deployments).
      - "127.0.0.1:5173:5173"
    volumes:
      # Persist runtime data (users, connections, tasks, playbooks, encrypted credentials)
      - envforge_data:/app/data
      # Mount host SSH keys read-only so EnvForge can connect to target VMs.
      # Override via SSH_KEY_DIR in .env if your keys live elsewhere.
      - ${SSH_KEY_DIR:-~/.ssh}:/home/envforge/.ssh:ro
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "5173"
      SERVE_WEB: "1"
      FOOL_DATA_DIR: /app/data
      FOOL_RUNTIME_DB: /app/data/runtime-db.json
      FOOL_SNAPSHOT_DIR: /app/data/snapshots
      SESSION_TTL_HOURS: "168"
      # **Required**: encryption key for stored SSH credentials. Do NOT change after first deploy.
      # Read from .env file. Container fails to start if missing or empty.
      ENVFORGE_MASTER_KEY: ${ENVFORGE_MASTER_KEY:?ENVFORGE_MASTER_KEY required - see .env.example}
      # Optional: comma-separated emails that auto-receive admin role on register.
      ENVFORGE_ADMIN_EMAILS: ${ENVFORGE_ADMIN_EMAILS:-}
      # Optional: public base URL for OAuth callbacks / generated links.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:5173}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  envforge_data:
    driver: local
