name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build all packages (required before typecheck)
        run: npm run build
      - name: Typecheck
        run: npm run typecheck
      - name: Preflight check
        run: npm run preflight
      - name: Catalog audit (consistency + package availability)
        run: npm run audit:catalog
